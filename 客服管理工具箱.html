<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服管理工具箱</title>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#333;--text2:#666;--border:#e0e0e0;--primary:#2c3e50;--green:#27ae60;--red:#e74c3c;--blue:#3498db;--yellow:#f39c12;}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg); min-height: 100vh; padding: 12px; color: var(--text); }
.container { max-width: 600px; margin: 0 auto; }
.header { background: var(--primary); color: #fff; padding: 16px; border-radius: 12px; margin-bottom: 12px; text-align: center; }
.header h1 { font-size: 18px; margin-bottom: 4px; }
.header p { font-size: 12px; opacity: 0.8; }

.tab-bar { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
.tab-bar button { flex: 1; min-width: 80px; padding: 10px 8px; border: none; border-radius: 10px; background: var(--card); color: var(--text); font-size: 13px; cursor: pointer; border: 1px solid var(--border); white-space: nowrap; }
.tab-bar button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.page { display: none; }
.page.active { display: block; }

.card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.card h3 { font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
th { background: var(--primary); color: #fff; padding: 10px 8px; text-align: center; font-weight: 600; }
td { padding: 8px; text-align: center; border: 1px solid var(--border); background: #fff; }
td input, td select { width: 100%; border: none; background: transparent; font-size: 13px; text-align: center; outline: none; color: var(--text); }
td input:focus { background: #f0f7ff; }
tr:nth-child(even) td { background: #f8f9fa; }
.add-row { display: flex; gap: 8px; margin-top: 10px; }
.add-row input { flex: 1; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; }
.add-row button { padding: 10px 16px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
.actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.actions button { flex: 1; padding: 8px; border: 1px solid var(--border); background: var(--card); border-radius: 8px; font-size: 12px; cursor: pointer; }
.actions button:hover { background: var(--primary); color: #fff; }
.stat-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
.stat-item { background: var(--bg); padding: 10px; border-radius: 8px; text-align: center; }
.stat-item .val { font-size: 18px; font-weight: 700; color: var(--primary); }
.stat-item .lab { font-size: 11px; color: var(--text2); }
.highlight-red { color: var(--red); font-weight: bold; }
.highlight-green { color: var(--green); font-weight: bold; }
.highlight-yellow { color: var(--yellow); font-weight: bold; }
.small-note { font-size: 11px; color: var(--text2); margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🧰 客服管理工具箱</h1>
<p>排班 · 考勤 · 扣罚 · 奖励</p>
</div>

<div class="tab-bar">
<button class="active" onclick="showTab('schedule')">📅 排班表</button>
<button onclick="showTab('attendance')">⏰ 考勤表</button>
<button onclick="showTab('penalty')">🚫 扣罚登记</button>
<button onclick="showTab('reward')">🏆 奖励表</button>
</div>

<!-- 排班表 -->
<div class="page active" id="tab-schedule">
<div class="card">
<h3>📅 客服排班表</h3>
<div class="table-wrap">
<table id="scheduleTable">
<thead><tr><th>日期</th><th>班次</th><th>客服A</th><th>客服B</th><th>客服C</th><th>客服D</th><th>备注</th></tr></thead>
<tbody id="scheduleBody"></tbody>
</table>
</div>
<div class="add-row">
<input type="date" id="scheduleDate">
<select id="scheduleShift"><option value="早班">早班</option><option value="中班">中班</option><option value="晚班">晚班</option><option value="全天">全天</option></select>
<input type="text" id="scheduleStaff" placeholder="填写客服姓名，用逗号分隔">
<input type="text" id="scheduleNote" placeholder="备注">
<button onclick="addSchedule()">添加</button>
</div>
<div class="actions">
<button onclick="exportTable('schedule')">💾 导出排班</button>
<button onclick="clearTable('schedule')">🗑️ 清空</button>
</div>
</div>
</div>

<!-- 考勤表 -->
<div class="page" id="tab-attendance">
<div class="card">
<h3>⏰ 月度考勤表</h3>
<div class="table-wrap">
<table id="attendanceTable">
<thead><tr><th>客服姓名</th><th>应出勤</th><th>实际出勤</th><th>迟到</th><th>早退</th><th>请假</th><th>旷工</th><th>出勤率</th></tr></thead>
<tbody id="attendanceBody"></tbody>
</table>
</div>
<div class="add-row">
<input type="text" id="attName" placeholder="客服姓名">
<input type="number" id="attShould" placeholder="应出勤天数" value="26">
<input type="number" id="attActual" placeholder="实际出勤">
<input type="number" id="attLate" placeholder="迟到次数" value="0">
<input type="number" id="attEarly" placeholder="早退次数" value="0">
<input type="number" id="attLeave" placeholder="请假天数" value="0">
<input type="number" id="attAbsent" placeholder="旷工天数" value="0">
<button onclick="addAttendance()">添加</button>
</div>
<div class="stat-box" id="attStat"></div>
<div class="actions">
<button onclick="exportTable('attendance')">💾 导出考勤</button>
<button onclick="clearTable('attendance')">🗑️ 清空</button>
</div>
</div>
</div>

<!-- 扣罚登记 -->
<div class="page" id="tab-penalty">
<div class="card">
<h3>🚫 扣罚登记表</h3>
<div class="table-wrap">
<table id="penaltyTable">
<thead><tr><th>日期</th><th>客服姓名</th><th>扣罚类型</th><th>扣罚金额</th><th>扣罚原因</th><th>确认人</th></tr></thead>
<tbody id="penaltyBody"></tbody>
</table>
</div>
<div class="add-row">
<input type="date" id="penDate">
<input type="text" id="penName" placeholder="客服姓名">
<select id="penType"><option value="迟到">迟到</option><option value="早退">早退</option><option value="旷工">旷工</option><option value="服务态度">服务态度</option><option value="其他">其他</option></select>
<input type="number" id="penAmount" placeholder="金额(元)">
<input type="text" id="penReason" placeholder="原因">
<input type="text" id="penConfirm" placeholder="确认人">
<button onclick="addPenalty()">添加</button>
</div>
<div class="stat-box" id="penStat"></div>
<div class="actions">
<button onclick="exportTable('penalty')">💾 导出扣罚</button>
<button onclick="clearTable('penalty')">🗑️ 清空</button>
</div>
</div>
</div>

<!-- 奖励表 -->
<div class="page" id="tab-reward">
<div class="card">
<h3>🏆 客服奖励表</h3>
<div class="table-wrap">
<table id="rewardTable">
<thead><tr><th>日期</th><th>客服姓名</th><th>奖励类型</th><th>奖励金额</th><th>奖励原因</th><th>审批人</th></tr></thead>
<tbody id="rewardBody"></tbody>
</table>
</div>
<div class="add-row">
<input type="date" id="rewDate">
<input type="text" id="rewName" placeholder="客服姓名">
<select id="rewType"><option value="月度之星">月度之星</option><option value="转化率冠军">转化率冠军</option><option value="客户好评">客户好评</option><option value="全勤奖">全勤奖</option><option value="其他">其他</option></select>
<input type="number" id="rewAmount" placeholder="金额(元)">
<input type="text" id="rewReason" placeholder="原因">
<input type="text" id="rewApprover" placeholder="审批人">
<button onclick="addReward()">添加</button>
</div>
<div class="stat-box" id="rewStat"></div>
<div class="actions">
<button onclick="exportTable('reward')">💾 导出奖励</button>
<button onclick="clearTable('reward')">🗑️ 清空</button>
</div>
</div>
</div>
</div>

<script>
const LS_KEY = 'csTool_';
function getData(key){ const d = localStorage.getItem(LS_KEY + key); return d ? JSON.parse(d) : []; }
function saveData(key, data){ localStorage.setItem(LS_KEY + key, JSON.stringify(data)); }

function showTab(name){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if(name === 'attendance') renderAttendance();
  if(name === 'penalty') renderPenalty();
  if(name === 'reward') renderReward();
}

// 排班
function renderSchedule(){
  const data = getData('schedule');
  const tbody = document.getElementById('scheduleBody');
  tbody.innerHTML = data.map((r, i) => `
    <tr><td>${r.date}</td><td>${r.shift}</td><td>${r.staff}</td><td></td><td></td><td></td><td>${r.note || '-'}</td></tr>
  `).join('');
}
function addSchedule(){
  const data = getData('schedule');
  data.push({
    date: document.getElementById('scheduleDate').value || formatDate(new Date()),
    shift: document.getElementById('scheduleShift').value,
    staff: document.getElementById('scheduleStaff').value,
    note: document.getElementById('scheduleNote').value
  });
  saveData('schedule', data); renderSchedule();
}

// 考勤
function renderAttendance(){
  const data = getData('attendance');
  const tbody = document.getElementById('attendanceBody');
  tbody.innerHTML = data.map((r, i) => {
    const rate = r.should > 0 ? Math.round(r.actual / r.should * 100) : 0;
    return `<tr><td>${r.name}</td><td>${r.should}</td><td>${r.actual}</td><td class="${r.late>0?'highlight-red':''}">${r.late}</td><td class="${r.early>0?'highlight-red':''}">${r.early}</td><td>${r.leave}</td><td class="${r.absent>0?'highlight-red':''}">${r.absent}</td><td class="${rate>=95?'highlight-green':'highlight-yellow'}">${rate}%</td></tr>`;
  }).join('');
  const totalShould = data.reduce((s,r)=>s+ (+r.should||0), 0);
  const totalActual = data.reduce((s,r)=>s+ (+r.actual||0), 0);
  const totalLate = data.reduce((s,r)=>s+ (+r.late||0), 0);
  const totalEarly = data.reduce((s,r)=>s+ (+r.early||0), 0);
  document.getElementById('attStat').innerHTML = `
    <div class="stat-item"><div class="val">${totalShould}</div><div class="lab">应出勤总天数</div></div>
    <div class="stat-item"><div class="val">${totalActual}</div><div class="lab">实际出勤总天数</div></div>
    <div class="stat-item"><div class="val">${totalLate}</div><div class="lab">迟到总次数</div></div>
    <div class="stat-item"><div class="val">${totalEarly}</div><div class="lab">早退总次数</div></div>
  `;
}
function addAttendance(){
  const data = getData('attendance');
  data.push({
    name: document.getElementById('attName').value,
    should: +document.getElementById('attShould').value || 26,
    actual: +document.getElementById('attActual').value || 0,
    late: +document.getElementById('attLate').value || 0,
    early: +document.getElementById('attEarly').value || 0,
    leave: +document.getElementById('attLeave').value || 0,
    absent: +document.getElementById('attAbsent').value || 0
  });
  saveData('attendance', data); renderAttendance();
}

// 扣罚
function renderPenalty(){
  const data = getData('penalty');
  const tbody = document.getElementById('penaltyBody');
  tbody.innerHTML = data.map((r, i) => `
    <tr><td>${r.date}</td><td>${r.name}</td><td>${r.type}</td><td class="highlight-red">-${r.amount}</td><td>${r.reason}</td><td>${r.confirm}</td></tr>
  `).join('');
  const total = data.reduce((s,r)=>s+ (+r.amount||0), 0);
  document.getElementById('penStat').innerHTML = `
    <div class="stat-item"><div class="val">${data.length}</div><div class="lab">扣罚记录数</div></div>
    <div class="stat-item"><div class="val highlight-red">${total}</div><div class="lab">扣罚总金额(元)</div></div>
  `;
}
function addPenalty(){
  const data = getData('penalty');
  data.push({
    date: document.getElementById('penDate').value || formatDate(new Date()),
    name: document.getElementById('penName').value,
    type: document.getElementById('penType').value,
    amount: +document.getElementById('penAmount').value || 0,
    reason: document.getElementById('penReason').value,
    confirm: document.getElementById('penConfirm').value
  });
  saveData('penalty', data); renderPenalty();
}

// 奖励
function renderReward(){
  const data = getData('reward');
  const tbody = document.getElementById('rewardBody');
  tbody.innerHTML = data.map((r, i) => `
    <tr><td>${r.date}</td><td>${r.name}</td><td>${r.type}</td><td class="highlight-green">+${r.amount}</td><td>${r.reason}</td><td>${r.approver}</td></tr>
  `).join('');
  const total = data.reduce((s,r)=>s+ (+r.amount||0), 0);
  document.getElementById('rewStat').innerHTML = `
    <div class="stat-item"><div class="val">${data.length}</div><div class="lab">奖励记录数</div></div>
    <div class="stat-item"><div class="val highlight-green">${total}</div><div class="lab">奖励总金额(元)</div></div>
  `;
}
function addReward(){
  const data = getData('reward');
  data.push({
    date: document.getElementById('rewDate').value || formatDate(new Date()),
    name: document.getElementById('rewName').value,
    type: document.getElementById('rewType').value,
    amount: +document.getElementById('rewAmount').value || 0,
    reason: document.getElementById('rewReason').value,
    approver: document.getElementById('rewApprover').value
  });
  saveData('reward', data); renderReward();
}

function formatDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function exportTable(name){
  const data = getData(name);
  if(data.length === 0){ alert('暂无数据'); return; }
  let csv = '';
  if(name === 'schedule') csv = '日期,班次,客服,备注\n' + data.map(r => `${r.date},${r.shift},"${r.staff}","${r.note || ''}"`).join('\n');
  if(name === 'attendance') csv = '姓名,应出勤,实际出勤,迟到,早退,请假,旷工\n' + data.map(r => `${r.name},${r.should},${r.actual},${r.late},${r.early},${r.leave},${r.absent}`).join('\n');
  if(name === 'penalty') csv = '日期,姓名,类型,金额,原因,确认人\n' + data.map(r => `${r.date},${r.name},${r.type},${r.amount},${r.reason},${r.confirm}`).join('\n');
  if(name === 'reward') csv = '日期,姓名,类型,金额,原因,审批人\n' + data.map(r => `${r.date},${r.name},${r.type},${r.amount},${r.reason},${r.approver}`).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `客服${name}_${formatDate(new Date())}.csv`; a.click(); URL.revokeObjectURL(url);
}

function clearTable(name){
  if(!confirm('确定清空该表所有数据？')) return;
  localStorage.removeItem(LS_KEY + name);
  if(name === 'schedule') renderSchedule();
  if(name === 'attendance') renderAttendance();
  if(name === 'penalty') renderPenalty();
  if(name === 'reward') renderReward();
}

// 初始化
renderSchedule();
</script>
</body>
</html>
