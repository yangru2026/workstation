      
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服聊天记录质检工具</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--primary:#0d9488;--green:#10b981;--red:#f43f5e;--blue:#38bdf8;--yellow:#f59e0b;--purple:#8b5cf6;--orange:#fb923c;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:24px}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:24px;font-weight:600;color:var(--primary);margin-bottom:4px}
.header p{font-size:13px;color:var(--text2)}

/* 统计卡片 */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-card h3{font-size:22px;font-weight:700;margin:0}
.stat-card p{font-size:13px;color:var(--text2);margin-top:2px}

/* 面板 */
.panel-card{background:var(--card);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:16px;overflow:hidden}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center;color:var(--text)}
.panel-body{padding:20px}

/* 表单 */
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.form-item{display:flex;flex-direction:column;gap:6px}
.form-item label{font-size:13px;font-weight:500;color:#475569}
.form-item input,.form-item select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;outline:none;transition:border .2s}
.form-item input:focus,.form-item select:focus{border-color:var(--primary)}

/* 粘贴区域 */
.paste-zone{border:2px dashed var(--border);border-radius:10px;padding:12px;transition:all .2s;background:#fff}
.paste-zone.dragover{border-color:var(--primary);background:#f0fdfa}
.paste-zone:focus-within{border-color:var(--primary)}
.paste-hint{font-size:12px;color:#94a3b8;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.paste-hint kbd{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:11px;font-family:inherit;border:1px solid #e2e8f0}
.paste-textarea{width:100%;min-height:60px;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;resize:vertical;outline:none;font-family:inherit}
.paste-textarea:focus{border-color:var(--primary)}
.paste-images{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.paste-img-box{position:relative;width:120px;height:120px;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;background:#f8fafc;display:flex;align-items:center;justify-content:center}
.paste-img-box img{max-width:100%;max-height:100%;object-fit:contain}
.paste-img-box .del-img{position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.paste-img-box .del-img:hover{background:var(--red)}
.paste-img-box .img-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 问题分类 */
.tag-group{display:flex;flex-wrap:wrap;gap:8px}
.tag-item{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:2px solid var(--border);background:#fff;transition:all .2s}
.tag-item:hover{border-color:var(--primary);color:var(--primary)}
.tag-item.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* 严重度 */
.severity-group{display:flex;gap:8px}
.sev-btn{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;border:2px solid var(--border);background:#fff;transition:all .2s;font-weight:500}
.sev-btn:hover{border-color:var(--primary);color:var(--primary)}
.sev-btn.active.normal{background:#f59e0b;color:#fff;border-color:#f59e0b}
.sev-btn.active.important{background:#f43f5e;color:#fff;border-color:#f43f5e}
.sev-btn.active.critical{background:#7c3aed;color:#fff;border-color:#7c3aed}

/* 按钮 */
.btn-group{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-p{background:var(--primary);color:#fff}
.btn-s{background:#f1f5f9;color:#475569}
.btn-g{background:var(--green);color:#fff}
.btn-r{background:var(--red);color:#fff}
.btn-i{background:var(--blue);color:#fff}
.btn-y{background:var(--yellow);color:#fff}

/* 筛选 */
.filter-bar{background:#f8fafc;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-bar label{font-size:13px;color:#64748b;font-weight:500}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;min-width:100px;background:#fff}

/* 记录列表 */
.record-list{display:flex;flex-direction:column;gap:12px}
.record-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;transition:all .2s}
.record-card:hover{border-color:var(--primary);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.record-card.pending{border-left:4px solid var(--red)}
.record-card.done{border-left:4px solid var(--green)}
.record-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.record-info{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.record-name{font-size:15px;font-weight:600;color:var(--text)}
.record-shop{font-size:12px;padding:3px 10px;border-radius:4px;background:#f0fdfa;color:var(--primary)}
.record-cid{font-size:12px;padding:3px 10px;border-radius:4px;background:#fef3c7;color:#d97706}
.record-date{font-size:12px;color:#94a3b8}
.record-status{font-size:12px;padding:3px 10px;border-radius:4px;font-weight:500}
.record-status.pending{background:#fee2e2;color:#dc2626}
.record-status.done{background:#dcfce7;color:#16a34a}
.record-tags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.record-tag{font-size:11px;padding:2px 8px;border-radius:4px}
.tag-huashu{background:#e0f2fe;color:#0284c7}
.tag-xiangying{background:#fef3c7;color:#d97706}
.tag-liucheng{background:#f3e8ff;color:#7c3aed}
.tag-taidu{background:#ffe4e6;color:#e11d48}
.tag-zhishi{background:#d1fae5;color:#059669}
.record-body{margin-bottom:10px}
.record-section{margin-bottom:10px}
.record-section-title{font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.record-section-text{font-size:13px;color:var(--text);line-height:1.6;background:#f8fafc;padding:10px 12px;border-radius:6px;white-space:pre-wrap;word-break:break-word}
.record-img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:8px}
.record-img-item{border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;cursor:pointer;background:#f8fafc;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.record-img-item img{width:100%;height:100%;object-fit:contain}
.record-img-item .img-loading{color:#94a3b8;font-size:12px}
.record-actions{display:flex;gap:8px;flex-wrap:wrap}
.record-actions .btn{font-size:12px;padding:6px 14px}

/* 空状态 */
.empty-state{text-align:center;padding:40px;color:#94a3b8}
.empty-state .icon{font-size:48px;margin-bottom:12px}

/* 模态框 */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;justify-content:center;align-items:center;z-index:1000;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;width:100%;max-width:720px;max-height:92vh;border-radius:16px;padding:0;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.1);display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{margin:0;font-size:16px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.close-btn{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer}
.close-btn:hover{color:var(--red)}

/* 图片预览模态框 */
.img-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:2000;padding:20px}
.img-preview-overlay.active{display:flex;flex-direction:column}
.img-preview-overlay img{max-width:90%;max-height:80vh;object-fit:contain;border-radius:8px}
.img-preview-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}
.img-preview-close:hover{background:rgba(255,255,255,.4)}
.img-preview-name{color:#fff;margin-top:12px;font-size:14px;text-align:center}

/* 讲解模式 */
.coach-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.coach-card h4{margin:0 0 12px 0;font-size:14px;color:var(--primary);display:flex;align-items:center;gap:8px}
.coach-card h4::before{content:"";width:4px;height:16px;background:var(--primary);border-radius:2px}
.coach-item{padding:12px;background:#f8fafc;border-radius:8px;margin-bottom:8px}
.coach-item .q{color:#dc2626;font-weight:600;margin-bottom:4px}
.coach-item .a{color:#059669;font-weight:600;margin-bottom:4px}
.coach-item .d{font-size:13px;color:var(--text2)}

/* 质检分析 */
.analysis-header{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--border)}
.analysis-header h2{color:var(--primary);margin-bottom:4px}
.analysis-header p{color:#94a3b8;font-size:13px}
.analysis-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.analysis-kpi{background:#fff;border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border)}
.analysis-kpi .num{font-size:24px;font-weight:700;color:var(--primary)}
.analysis-kpi .lbl{font-size:12px;color:var(--text2);margin-top:4px}
.analysis-kpi .trend{font-size:11px;margin-top:4px;font-weight:500}
.trend-up{color:var(--green)}
.trend-down{color:var(--red)}
.trend-flat{color:var(--text2)}

.analysis-section{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.analysis-section h4{margin:0 0 12px 0;font-size:14px;color:var(--primary);display:flex;align-items:center;gap:8px}
.analysis-section h4::before{content:"";width:4px;height:16px;background:var(--primary);border-radius:2px}

.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:13px}
.bar-label{width:80px;text-align:right;color:#475569;font-weight:500;white-space:nowrap}
.bar-track{flex:1;height:22px;background:#f1f5f9;border-radius:11px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:11px;transition:width .5s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;color:#fff;font-weight:600}
.bar-val{min-width:40px;text-align:left;color:var(--text2);font-size:12px}

.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.timeline-dot.pending{background:var(--red)}
.timeline-dot.done{background:var(--green)}
.timeline-content{flex:1}
.timeline-date{font-size:11px;color:#94a3b8;margin-bottom:2px}
.timeline-text{font-size:13px;color:var(--text)}
.timeline-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.timeline-tag{font-size:10px;padding:1px 6px;border-radius:3px}

.suggestion-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;margin-bottom:10px}
.suggestion-box.warn{background:#fffbeb;border-color:#fcd34d}
.suggestion-box.alert{background:#fef2f2;border-color:#fca5a5}
.suggestion-title{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.suggestion-text{font-size:13px;color:var(--text2);line-height:1.5}

.repeat-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.repeat-table th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid var(--border)}
.repeat-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
.repeat-table .count{font-weight:700;color:var(--red)}

.compare-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.compare-card{flex:1;min-width:140px;background:#f8fafc;border-radius:8px;padding:12px;text-align:center}
.compare-card .period{font-size:11px;color:#94a3b8;margin-bottom:4px}
.compare-card .val{font-size:20px;font-weight:700;color:var(--text)}
.compare-card .delta{font-size:12px;margin-top:4px;font-weight:600}

@media(max-width:768px){
.analysis-grid{grid-template-columns:repeat(2,1fr)}
.compare-row{flex-direction:column}
}

@media(max-width:768px){
.container{padding:12px}
.stats-row{grid-template-columns:repeat(2,1fr)}
.form-grid{grid-template-columns:1fr}
.filter-bar{flex-direction:column;align-items:stretch}
.record-img-grid{grid-template-columns:repeat(2,1fr)}
}

@media print{
body{background:#fff}
.container{max-width:100%;padding:16px}
.stats-row,.filter-bar,.btn-group,.record-actions{display:none!important}
.panel-card{box-shadow:none;border:1px solid #ddd}
.record-card{border:1px solid #ddd;break-inside:avoid}
.modal-overlay,.img-preview-overlay{display:none!important}
}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>📋 客服聊天记录质检工具</h1>
<p>记录问题 → 整理归纳 → 一对一讲解 | 支持截图 Ctrl+V 直接粘贴</p>
</div>

<!-- 统计 -->
<div class="stats-row">
<div class="stat-card" onclick="filterByStatus('pending')">
<div class="stat-icon" style="background:#fee2e2;color:#dc2626">📌</div>
<div><h3 id="statPending">0</h3><p>待讲解</p></div>
</div>
<div class="stat-card" onclick="filterByStatus('done')">
<div class="stat-icon" style="background:#dcfce7;color:#16a34a">✅</div>
<div><h3 id="statDone">0</h3><p>已讲解</p></div>
</div>
<div class="stat-card">
<div class="stat-icon" style="background:#e0f2fe;color:#0284c7">📊</div>
<div><h3 id="statWeek">0</h3><p>本周质检</p></div>
</div>
<div class="stat-card">
<div class="stat-icon" style="background:#fef3c7;color:#d97706">📈</div>
<div><h3 id="statTotal">0</h3><p>质检总数</p></div>
</div>
</div>

<!-- 录入面板 -->
<div class="panel-card">
<div class="panel-header">📝 新增质检记录</div>
<div class="panel-body">
<div class="form-grid">
<div class="form-item">
<label>客服姓名 <span style="color:var(--red)">*</span></label>
<input type="text" id="inpStaff" placeholder="如：小张" list="staffList">
<datalist id="staffList"></datalist>
</div>
<div class="form-item">
<label>客户ID <span style="color:var(--text2);font-weight:400">(网名/订单号)</span></label>
<input type="text" id="inpCustomerId" placeholder="客户网名或订单号">
</div>
<div class="form-item">
<label>所属店铺 <span style="color:var(--red)">*</span></label>
<select id="inpShop">
<option value="">请选择</option>
<option>抖音1店</option><option>抖音2店</option><option>抖音3店</option>
<option>快手MS</option>
<option>拼多多1店</option><option>拼多多2店</option><option>拼多多3店</option><option>拼多多4店</option><option>拼多多5店</option>
<option>天猫MS</option><option>天猫极氧</option>
</select>
</div>
</div>

<div class="form-item" style="margin-bottom:12px">
<label>质检日期</label>
<input type="date" id="inpDate" style="max-width:200px">
</div>

<div class="form-item" style="margin-bottom:16px">
<label>问题分类 <span style="color:var(--red)">*</span></label>
<div class="tag-group" id="tagGroup">
<span class="tag-item" data-val="话术问题" onclick="toggleTag(this)">话术问题</span>
<span class="tag-item" data-val="响应问题" onclick="toggleTag(this)">响应问题</span>
<span class="tag-item" data-val="流程问题" onclick="toggleTag(this)">流程问题</span>
<span class="tag-item" data-val="态度问题" onclick="toggleTag(this)">态度问题</span>
<span class="tag-item" data-val="产品知识" onclick="toggleTag(this)">产品知识</span>
<span class="tag-item" data-val="其他" onclick="toggleTag(this)">其他</span>
</div>
</div>

<div class="form-item" style="margin-bottom:16px">
<label>严重程度</label>
<div class="severity-group" id="sevGroup">
<button class="sev-btn normal active" data-val="一般" onclick="setSeverity(this,'一般')">一般提醒</button>
<button class="sev-btn important" data-val="严重" onclick="setSeverity(this,'严重')">严重问题</button>
<button class="sev-btn critical" data-val="严重需整改" onclick="setSeverity(this,'严重需整改')">严重需整改</button>
</div>
</div>

<!-- 客户问题区域 -->
<div class="form-item" style="margin-bottom:16px">
<label>客户问题 / 聊天记录截图</label>
<div class="paste-zone" id="zoneScene" tabindex="0">
<div class="paste-hint">💡 在此输入文字描述，或 <kbd>Ctrl+V</kbd> 粘贴截图 / <kbd>拖拽</kbd> 图片到此处</div>
<textarea class="paste-textarea" id="inpScene" placeholder="描述客户遇到的问题..."></textarea>
<div class="paste-images" id="imgScene"></div>
</div>
</div>

<!-- 客服回复区域 -->
<div class="form-item" style="margin-bottom:16px">
<label>客服实际回复 / 聊天记录截图</label>
<div class="paste-zone" id="zoneReply" tabindex="0">
<div class="paste-hint">💡 在此输入文字描述，或 <kbd>Ctrl+V</kbd> 粘贴截图 / <kbd>拖拽</kbd> 图片到此处</div>
<textarea class="paste-textarea" id="inpReply" placeholder="描述客服的回复内容..."></textarea>
<div class="paste-images" id="imgReply"></div>
</div>
</div>

<div class="form-grid">
<div class="form-item">
<label>问题描述 <span style="color:var(--red)">*</span></label>
<textarea class="paste-textarea" id="inpProblem" placeholder="详细描述问题所在..." style="min-height:80px"></textarea>
</div>
<div class="form-item">
<label>正确做法 / 建议话术</label>
<textarea class="paste-textarea" id="inpCorrect" placeholder="应该怎么说/怎么做..." style="min-height:80px"></textarea>
</div>
</div>

<div class="form-item" style="margin-bottom:8px">
<label>备注（可选）</label>
<input type="text" id="inpNote" placeholder="补充说明">
</div>

<div class="btn-group">
<button class="btn btn-p" onclick="addRecord()">➕ 保存质检记录</button>
<button class="btn btn-s" onclick="clearForm()">清空表单</button>
</div>
</div>
</div>

<!-- 筛选与列表 -->
<div class="panel-card">
<div class="panel-header">
<span>📋 质检记录列表</span>
<div style="display:flex;gap:8px">
<button class="btn btn-i" onclick="openCoachMode()" style="font-size:12px;padding:6px 14px">🎯 讲解模式</button>

<script>
/* ==================== IndexedDB 图片存储 ==================== */
const DB_NAME = 'qc_img_db';
const STORE_NAME = 'images';
let db = null;

function openImgDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
  });
}

async function saveImageToDB(id, blob) {
  if (!db) await openImgDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.put({ id, blob, time: Date.now() });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getImageFromDB(id) {
  if (!db) await openImgDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.get(id);
    req.onsuccess = () => resolve(req.result ? req.result.blob : null);
    req.onerror = () => reject(req.error);
  });
}

async function deleteImageFromDB(id) {
  if (!db) await openImgDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.delete(id);
    tx.oncomplete = () => resolve();
  });
}

async function blobToDataURL(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

/* ==================== 数据存储 ==================== */
const STORAGE_KEY = 'yangru_qc_records_v2';
let records = [];
let editingId = null;
let currentSeverity = '一般';
let currentTags = [];
// 临时存储待提交的图片 {scene:[{id, blob}], reply:[{id, blob}]}
let pendingImages = { scene: [], reply: [] };

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return formatDate(new Date()); }
function thisWeekStart() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return formatDate(new Date(d.setDate(diff)));
}

function loadRecords() {
  const s = localStorage.getItem(STORAGE_KEY);
  if (s) { try { records = JSON.parse(s); } catch(e) { records = []; } }
  document.getElementById('inpDate').value = formatDate(new Date());
  openImgDB().then(() => {
    updateStaffDatalist();
    updateFilterOptions();
    updateStats();
    renderRecords();
    setupPasteHandlers();
  });
}

function saveRecords() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  updateStats();
  updateStaffDatalist();
  updateFilterOptions();
}

/* ==================== 粘贴图片处理 ==================== */
function setupPasteHandlers() {
  setupZone('zoneScene', 'imgScene', 'scene');
  setupZone('zoneReply', 'imgReply', 'reply');
}

function setupZone(zoneId, imgContainerId, type) {
  const zone = document.getElementById(zoneId);
  const imgContainer = document.getElementById(imgContainerId);

  zone.addEventListener('paste', async (e) => {
    e.preventDefault();
    const items = e.clipboardData.items;
    let hasImage = false;
    for (let item of items) {
      if (item.type.indexOf('image') !== -1) {
        hasImage = true;
        const blob = item.getAsFile();
        const id = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        await saveImageToDB(id, blob);
        pendingImages[type].push({ id, blob });
        renderPendingImage(imgContainer, id, blob, type);
      }
    }
    if (!hasImage) {
      // 不是图片，尝试粘贴文本到 textarea
      const text = e.clipboardData.getData('text');
      const ta = zone.querySelector('textarea');
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      ta.value = ta.value.substring(0, start) + text + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + text.length;
    }
  });

  // 拖拽上传
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', async (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    for (let file of files) {
      if (file.type.indexOf('image') !== -1) {
        const id = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        await saveImageToDB(id, file);
        pendingImages[type].push({ id, blob: file });
        renderPendingImage(imgContainer, id, file, type);
      }
    }
  });
}

function renderPendingImage(container, id, blob, type) {
  const url = URL.createObjectURL(blob);
  const div = document.createElement('div');
  div.className = 'paste-img-box';
  div.dataset.imgId = id;
  div.innerHTML = `<img src="${url}" alt=""><button class="del-img" onclick="removePendingImage('${id}','${type}')">×</button>`;
  container.appendChild(div);
}

function removePendingImage(id, type) {
  pendingImages[type] = pendingImages[type].filter(img => img.id !== id);
  const container = type === 'scene' ? document.getElementById('imgScene') : document.getElementById('imgReply');
  const el = container.querySelector(`[data-img-id="${id}"]`);
  if (el) el.remove();
}

function clearPendingImages() {
  pendingImages = { scene: [], reply: [] };
  document.getElementById('imgScene').innerHTML = '';
  document.getElementById('imgReply').innerHTML = '';
}

/* ==================== 统计 ==================== */
function updateStats() {
  const pending = records.filter(r => r.status === 'pending').length;
  const done = records.filter(r => r.status === 'done').length;
  const weekStart = thisWeekStart();
  const weekCount = records.filter(r => r.date >= weekStart).length;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statWeek').textContent = weekCount;
  document.getElementById('statTotal').textContent = records.length;
}

/* ==================== 表单交互 ==================== */
function toggleTag(el) {
  const val = el.dataset.val;
  if (el.classList.contains('active')) {
    el.classList.remove('active');
    currentTags = currentTags.filter(t => t !== val);
  } else {
    el.classList.add('active');
    currentTags.push(val);
  }
}

function setSeverity(btn, val) {
  document.querySelectorAll('#sevGroup .sev-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSeverity = val;
}

function clearForm() {
  document.getElementById('inpStaff').value = '';
  document.getElementById('inpCustomerId').value = '';
  document.getElementById('inpShop').value = '';
  document.getElementById('inpDate').value = formatDate(new Date());
  document.getElementById('inpScene').value = '';
  document.getElementById('inpReply').value = '';
  document.getElementById('inpProblem').value = '';
  document.getElementById('inpCorrect').value = '';
  document.getElementById('inpNote').value = '';
  currentTags = [];
  document.querySelectorAll('#tagGroup .tag-item').forEach(t => t.classList.remove('active'));
  currentSeverity = '一般';
  document.querySelectorAll('#sevGroup .sev-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('#sevGroup .sev-btn[data-val="一般"]').classList.add('active');
  clearPendingImages();
}

async function addRecord() {
  const staff = document.getElementById('inpStaff').value.trim();
  const customerId = document.getElementById('inpCustomerId').value.trim();
  const shop = document.getElementById('inpShop').value;
  const date = document.getElementById('inpDate').value;
  const scene = document.getElementById('inpScene').value.trim();
  const reply = document.getElementById('inpReply').value.trim();
  const problem = document.getElementById('inpProblem').value.trim();
  const correct = document.getElementById('inpCorrect').value.trim();
  const note = document.getElementById('inpNote').value.trim();

  if (!staff) { alert('请输入客服姓名'); return; }
  if (!shop) { alert('请选择所属店铺'); return; }
  if (!problem) { alert('请输入问题描述'); return; }
  if (currentTags.length === 0) { alert('请选择至少一个问题分类'); return; }

  const record = {
    id: Date.now().toString(),
    staff, customerId, shop, date: date || todayStr(),
    tags: [...currentTags],
    severity: currentSeverity,
    scene, reply, problem, correct, note,
    sceneImages: pendingImages.scene.map(img => img.id),
    replyImages: pendingImages.reply.map(img => img.id),
    status: 'pending',
    coachDate: '',
    coachNote: '',
    createTime: new Date().toISOString()
  };

  records.unshift(record);
  saveRecords();
  renderRecords();
  clearForm();
  alert('✅ 质检记录已保存');
}

/* ==================== 图片显示 ==================== */
async function renderRecordImages(container, imageIds) {
  if (!imageIds || !imageIds.length) return;
  container.innerHTML = '';
  for (const id of imageIds) {
    const blob = await getImageFromDB(id);
    if (!blob) continue;
    const url = URL.createObjectURL(blob);
    const div = document.createElement('div');
    div.className = 'record-img-item';
    div.onclick = () => previewImage(url, id);
    div.innerHTML = `<img src="${url}" alt="" loading="lazy">`;
    container.appendChild(div);
  }
}

function previewImage(url, name) {
  document.getElementById('imgPreviewSrc').src = url;
  document.getElementById('imgPreviewName').textContent = name;
  document.getElementById('imgPreview').classList.add('active');
}

function closeImgPreview() {
  document.getElementById('imgPreview').classList.remove('active');
  document.getElementById('imgPreviewSrc').src = '';
}

/* ==================== 筛选与列表 ==================== */
function updateStaffDatalist() {
  const staffs = [...new Set(records.map(r => r.staff))].sort();
  const dl = document.getElementById('staffList');
  dl.innerHTML = staffs.map(s => `<option value="${s}">`).join('');
}

function updateFilterOptions() {
  const staffs = [...new Set(records.map(r => r.staff))].sort();
  const shops = [...new Set(records.map(r => r.shop))].sort();
  const fStaff = document.getElementById('filterStaff');
  const fShop = document.getElementById('filterShop');
  const curStaff = fStaff.value;
  const curShop = fShop.value;
  fStaff.innerHTML = '<option value="">全部</option>' + staffs.map(s => `<option value="${s}"${s===curStaff?' selected':''}>${s}</option>`).join('');
  fShop.innerHTML = '<option value="">全部</option>' + shops.map(s => `<option value="${s}"${s===curShop?' selected':''}>${s}</option>`).join('');
}

function getFilteredRecords() {
  let r = [...records];
  const fStaff = document.getElementById('filterStaff').value;
  const fShop = document.getElementById('filterShop').value;
  const fTag = document.getElementById('filterTag').value;
  const fStatus = document.getElementById('filterStatus').value;
  const fFrom = document.getElementById('filterDateFrom').value;
  const fTo = document.getElementById('filterDateTo').value;
  if (fStaff) r = r.filter(x => x.staff === fStaff);
  if (fShop) r = r.filter(x => x.shop === fShop);
  if (fTag) r = r.filter(x => x.tags.includes(fTag));
  if (fStatus) r = r.filter(x => x.status === fStatus);
  if (fFrom) r = r.filter(x => x.date >= fFrom);
  if (fTo) r = r.filter(x => x.date <= fTo);
  return r;
}

function renderRecords() {
  const list = getFilteredRecords();
  const el = document.getElementById('recordList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><div>暂无质检记录</div><div style="font-size:13px;margin-top:4px">点击上方「新增质检记录」开始录入</div></div>`;
    return;
  }

  el.innerHTML = list.map(r => {
    const tagHtml = r.tags.map(t => {
      const cls = t==='话术问题'?'tag-huashu':t==='响应问题'?'tag-xiangying':t==='流程问题'?'tag-liucheng':t==='态度问题'?'tag-taidu':t==='产品知识'?'tag-zhishi':'tag-huashu';
      return `<span class="record-tag ${cls}">${t}</span>`;
    }).join('');
    const sevColor = r.severity==='一般'?'#f59e0b':r.severity==='严重'?'#f43f5e':'#7c3aed';
    const statusText = r.status==='pending'?'待讲解':'已讲解';
    const statusClass = r.status==='pending'?'pending':'done';

    return `<div class="record-card ${statusClass}" data-id="${r.id}">
      <div class="record-header">
        <div class="record-info">
          <span class="record-name">${r.staff}</span>
          <span class="record-shop">${r.shop}</span>
          ${r.customerId?`<span class="record-cid">👤 ${r.customerId}</span>`:''}
          <span class="record-date">📅 ${r.date}</span>
          <span class="record-status ${statusClass}">${statusText}</span>
          ${r.severity!=='一般'?`<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${sevColor}20;color:${sevColor};font-weight:600">${r.severity}</span>`:''}
        </div>
      </div>
      <div class="record-tags">${tagHtml}</div>
      <div class="record-body">
        ${r.scene?`<div class="record-section"><div class="record-section-title">🗣️ 客户问题</div><div class="record-section-text">${escapeHtml(r.scene)}</div></div>`:''}
        ${r.sceneImages?.length?`<div class="record-section"><div class="record-section-title">📸 客户问题截图</div><div class="record-img-grid" id="sceneImg_${r.id}"><div class="img-loading">加载中...</div></div></div>`:''}
        ${r.reply?`<div class="record-section"><div class="record-section-title">💬 客服回复</div><div class="record-section-text">${escapeHtml(r.reply)}</div></div>`:''}
        ${r.replyImages?.length?`<div class="record-section"><div class="record-section-title">📸 客服回复截图</div><div class="record-img-grid" id="replyImg_${r.id}"><div class="img-loading">加载中...</div></div></div>`:''}
        <div class="record-section"><div class="record-section-title">❌ 问题描述</div><div class="record-section-text" style="background:#fff5f5;border:1px solid #fecaca;color:#991b1b">${escapeHtml(r.problem)}</div></div>
        ${r.correct?`<div class="record-section"><div class="record-section-title">✅ 正确做法 / 建议</div><div class="record-section-text" style="background:#f0fdf4;border:1px solid #bbf7d0;color:#166534">${escapeHtml(r.correct)}</div></div>`:''}
        ${r.note?`<div class="record-section"><div class="record-section-title">📝 备注</div><div class="record-section-text">${escapeHtml(r.note)}</div></div>`:''}
        ${r.coachDate?`<div class="record-section"><div class="record-section-title">📢 讲解记录</div><div class="record-section-text" style="background:#f0fdfa;border:1px solid #99f6e4;color:#0f766e">📅 讲解日期：${r.coachDate}${r.coachNote?'<br>📝 讲解备注：'+escapeHtml(r.coachNote):''}</div></div>`:''}
      </div>
      <div class="record-actions">
        ${r.status==='pending'?`<button class="btn btn-g" onclick="markDone('${r.id}')">✅ 标记已讲解</button>`:`<button class="btn btn-s" onclick="markPending('${r.id}')">↩️ 标记待讲解</button>`}
        <button class="btn btn-i" onclick="editRecord('${r.id}')">✏️ 编辑</button>
        <button class="btn btn-r" onclick="deleteRecord('${r.id}')">🗑️ 删除</button>
      </div>
    </div>`;
  }).join('');

  // 异步加载图片
  list.forEach(r => {
    if (r.sceneImages?.length) renderRecordImages(document.getElementById('sceneImg_' + r.id), r.sceneImages);
    if (r.replyImages?.length) renderRecordImages(document.getElementById('replyImg_' + r.id), r.replyImages);
  });
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function clearFilters() {
  document.getElementById('filterStaff').value = '';
  document.getElementById('filterShop').value = '';
  document.getElementById('filterTag').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  renderRecords();
}

function filterByStatus(status) {
  document.getElementById('filterStatus').value = status;
  renderRecords();
  document.getElementById('recordList').scrollIntoView({ behavior: 'smooth' });
}

/* ==================== 记录操作 ==================== */
function markDone(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  const note = prompt('讲解备注（可选，如：客服已理解并承诺改正）：') || '';
  r.status = 'done';
  r.coachDate = todayStr();
  r.coachNote = note;
  saveRecords();
  renderRecords();
}

function markPending(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  r.status = 'pending';
  r.coachDate = '';
  r.coachNote = '';
  saveRecords();
  renderRecords();
}

async function deleteRecord(id) {
  if (!confirm('确定删除这条质检记录？')) return;
  const r = records.find(x => x.id === id);
  if (r) {
    // 删除关联图片
    if (r.sceneImages) for (const imgId of r.sceneImages) await deleteImageFromDB(imgId);
    if (r.replyImages) for (const imgId of r.replyImages) await deleteImageFromDB(imgId);
  }
  records = records.filter(x => x.id !== id);
  saveRecords();
  renderRecords();
}

/* ==================== 编辑 ==================== */
async function editRecord(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingId = id;

  const body = document.getElementById('editBody');
  body.innerHTML = `
    <div class="form-grid">
      <div class="form-item"><label>客服姓名</label><input type="text" id="editStaff" value="${r.staff}"></div>
      <div class="form-item"><label>客户ID</label><input type="text" id="editCustomerId" value="${r.customerId||''}"></div>
      <div class="form-item"><label>所属店铺</label><select id="editShop">${getShopOptions(r.shop)}</select></div>
    </div>
    <div class="form-item" style="margin-bottom:12px"><label>质检日期</label><input type="date" id="editDate" value="${r.date}"></div>
    <div class="form-item" style="margin-bottom:12px"><label>问题分类（多选）</label>
      <div class="tag-group" id="editTagGroup">
        ${['话术问题','响应问题','流程问题','态度问题','产品知识','其他'].map(t =>
          `<span class="tag-item${r.tags.includes(t)?' active':''}" data-val="${t}" onclick="toggleEditTag(this)">${t}</span>`
        ).join('')}
      </div>
    </div>
    <div class="form-item" style="margin-bottom:12px"><label>严重程度</label>
      <div class="severity-group">
        <button class="sev-btn normal${r.severity==='一般'?' active':''}" onclick="setEditSev(this,'一般')">一般提醒</button>
        <button class="sev-btn important${r.severity==='严重'?' active':''}" onclick="setEditSev(this,'严重')">严重问题</button>
        <button class="sev-btn critical${r.severity==='严重需整改'?' active':''}" onclick="setEditSev(this,'严重需整改')">严重需整改</button>
      </div>
    </div>
    <div class="form-item"><label>客户问题</label><textarea class="paste-textarea" id="editScene">${r.scene||''}</textarea></div>

let editSeverity = '';
let editTags = [];

function getShopOptions(selected) {
  const shops = ['抖音1店','抖音2店','抖音3店','快手MS','拼多多1店','拼多多2店','拼多多3店','拼多多4店','拼多多5店','天猫MS','天猫极氧'];
  return shops.map(s => `<option value="${s}"${s===selected?' selected':''}>${s}</option>`).join('');
}

function toggleEditTag(el) {
  const val = el.dataset.val;
  if (el.classList.contains('active')) { el.classList.remove('active'); editTags = editTags.filter(t => t !== val); }
  else { el.classList.add('active'); editTags.push(val); }
}

function setEditSev(btn, val) {
  btn.parentElement.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  editSeverity = val;
}

function saveEdit() {
  const r = records.find(x => x.id === editingId);
  if (!r) return;
  r.staff = document.getElementById('editStaff').value.trim();
  r.customerId = document.getElementById('editCustomerId').value.trim();
  r.shop = document.getElementById('editShop').value;
  r.date = document.getElementById('editDate').value;
  r.scene = document.getElementById('editScene').value.trim();
  r.reply = document.getElementById('editReply').value.trim();
  r.problem = document.getElementById('editProblem').value.trim();
  r.correct = document.getElementById('editCorrect').value.trim();
  r.note = document.getElementById('editNote').value.trim();
  r.coachDate = document.getElementById('editCoachDate').value;
  r.coachNote = document.getElementById('editCoachNote').value.trim();
  r.status = document.getElementById('editStatus').value;
  if (editTags.length) r.tags = [...editTags];
  if (editSeverity) r.severity = editSeverity;
  saveRecords();
  renderRecords();
  closeEditModal();
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  editingId = null;
  editTags = [];
  editSeverity = '';
}

/* ==================== 质检分析 ==================== */
function openAnalysisMode() {
  const staffList = [...new Set(records.map(r => r.staff))].sort();
  if (!staffList.length) { alert('暂无质检数据，请先录入记录'); return; }

  let html = '<div style="margin-bottom:16px"><label style="font-size:13px;font-weight:500;color:#475569">选择要分析的客服：</label><select id="analysisStaffSelect" onchange="renderAnalysisSheet()" style="margin-left:8px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px">';
  html += '<option value="">-- 请选择 --</option>';
  html += `<option value="_all_">📊 全部客服汇总 (共${records.length}条)</option>`;
  staffList.forEach(s => {
    const count = records.filter(r => r.staff === s).length;
    const pending = records.filter(r => r.staff === s && r.status === 'pending').length;
    html += `<option value="${s}">${s} (共${count}条${pending?`，待讲'+pending+'条':''})</option>`;
  });
  html += '</select></div>';
  html += '<div id="analysisSheet"></div>';
  document.getElementById('analysisBody').innerHTML = html;
  document.getElementById('analysisModal').classList.add('active');
}

function renderAnalysisSheet() {
  const staff = document.getElementById('analysisStaffSelect').value;
  const el = document.getElementById('analysisSheet');
  if (!staff) { el.innerHTML = ''; return; }

  // ===== 全部客服汇总 =====
  if (staff === '_all_') {
    renderAllStaffSummary(el);
    return;
  }

  const allRecs = records.filter(r => r.staff === staff).sort((a,b) => b.date.localeCompare(a.date));
  const pendingRecs = allRecs.filter(r => r.status === 'pending');
  const doneRecs = allRecs.filter(r => r.status === 'done');

  // 时间分段：近30天 vs 更早
  const thirtyDaysAgo = formatDate(new Date(Date.now() - 30*86400000));
  const recentRecs = allRecs.filter(r => r.date >= thirtyDaysAgo);
  const olderRecs = allRecs.filter(r => r.date < thirtyDaysAgo);

  // 分类统计
  const tagCounts = {};
  allRecs.forEach(r => r.tags.forEach(t => tagCounts[t] = (tagCounts[t]||0) + 1));
  const tagList = Object.entries(tagCounts).sort((a,b) => b[1]-a[1]);
  const totalTags = tagList.reduce((s,[,c])=>s+c,0);

  // 严重度统计
  const sevCounts = {};
  allRecs.forEach(r => sevCounts[r.severity] = (sevCounts[r.severity]||0) + 1);

  // 重复问题检测（同一分类出现≥2次）
  const repeats = tagList.filter(([,c]) => c >= 2);

  // 店铺分布
  const shopCounts = {};
  allRecs.forEach(r => shopCounts[r.shop] = (shopCounts[r.shop]||0) + 1);

  // 生成建议
  const suggestions = [];
  if (repeats.length > 0) {
    const topRepeat = repeats[0];
    suggestions.push({type:'alert', title:'⚠️ 重复问题突出', text:`「${topRepeat[0]}」出现 ${topRepeat[1]} 次，是${staff}最频繁的质检问题。建议重点强化该方面的培训和日常监督。`});
  }
  if (pendingRecs.length > 0) {
    suggestions.push({type:'warn', title:'📌 待讲解未闭环', text:`还有 ${pendingRecs.length} 条质检记录未进行一对一讲解，建议尽快安排。`});
  }
  if (sevCounts['严重'] > 0 || sevCounts['严重需整改'] > 0) {
    const serious = (sevCounts['严重']||0) + (sevCounts['严重需整改']||0);
    suggestions.push({type:'alert', title:'🚨 存在严重问题', text:`历史记录中有 ${serious} 条严重/需整改级别的问题，需重点关注并跟踪改进效果。`});
  }
  if (recentRecs.length > olderRecs.length && olderRecs.length > 0) {
    suggestions.push({type:'warn', title:'📈 近期问题增多', text:`近30天有 ${recentRecs.length} 条记录，相比之前明显增多，建议排查原因。`});
  } else if (recentRecs.length === 0 && olderRecs.length > 0) {
    suggestions.push({type:'ok', title:'✅ 近期表现良好', text:`近30天没有新的质检问题，改进效果明显，继续保持！`});
  }
  if (suggestions.length === 0) {
    suggestions.push({type:'ok', title:'✅ 整体情况良好', text:`${staff}的质检记录较少，暂无突出问题。建议持续保持现有工作标准。`});
  }

  let html = '';

  // 头部
  html += `<div class="analysis-header">
    <h2>${staff} — 质检质量分析报告</h2>
    <p>报告生成日期：${todayStr()} | 数据范围：全部历史记录</p>
  </div>`;

  // KPI 卡片
  html += `<div class="analysis-grid">
    <div class="analysis-kpi"><div class="num">${allRecs.length}</div><div class="lbl">质检总数</div></div>
    <div class="analysis-kpi"><div class="num" style="color:var(--red)">${pendingRecs.length}</div><div class="lbl">待讲解</div></div>
    <div class="analysis-kpi"><div class="num" style="color:var(--green)">${doneRecs.length}</div><div class="lbl">已讲解</div></div>
    <div class="analysis-kpi"><div class="num" style="color:var(--blue)">${Math.round(doneRecs.length / (allRecs.length||1) * 100)}%</div><div class="lbl">闭环率</div></div>
  </div>`;

  // 近30天 vs 历史对比
  if (olderRecs.length > 0) {
    html += `<div class="analysis-section">
      <h4>📊 近期 vs 历史对比（近30天）</h4>
      <div class="compare-row">
        <div class="compare-card"><div class="period">近30天</div><div class="val" style="color:var(--red)">${recentRecs.length}</div><div class="lbl">条记录</div></div>
        <div class="compare-card"><div class="period">30天前</div><div class="val">${olderRecs.length}</div><div class="lbl">条记录</div></div>
        <div class="compare-card"><div class="period">变化趋势</div>
          <div class="delta ${recentRecs.length >= olderRecs.length ? 'trend-down' : 'trend-up'}">
            ${recentRecs.length >= olderRecs.length ? '↑ 近期问题增多' : '↓ 问题在减少'}
          </div>
        </div>
        <div class="compare-card"><div class="period">近30天闭环率</div>
          <div class="val" style="color:${recentRecs.filter(r=>r.status==='done').length/(recentRecs.length||1)*100>=80?'var(--green)':'var(--red)'}">
            ${Math.round(recentRecs.filter(r=>r.status==='done').length/(recentRecs.length||1)*100)}%
          </div>
        </div>
      </div>
    </div>`;
  }

  // 问题分类分布
  if (tagList.length) {
    const colors = ['#0d9488','#38bdf8','#f59e0b','#f43f5e','#8b5cf6','#fb923c'];
    html += `<div class="analysis-section">
      <h4>📈 问题分类分布</h4>
      <div class="bar-chart">`;
    tagList.forEach(([tag, count], i) => {
      const pct = Math.round(count / totalTags * 100);
      html += `<div class="bar-row">
        <div class="bar-label">${tag}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}">${pct}%</div></div>
        <div class="bar-val">${count}次</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // 严重度分布
  if (Object.keys(sevCounts).length) {
    html += `<div class="analysis-section">
      <h4>⚡ 严重程度分布</h4>
      <div class="compare-row">`;
    const sevMeta = {'一般':{color:'#f59e0b',label:'一般提醒'},'严重':{color:'#f43f5e',label:'严重问题'},'严重需整改':{color:'#7c3aed',label:'严重需整改'}};
    Object.entries(sevCounts).forEach(([sev, count]) => {
      const meta = sevMeta[sev] || {color:'#94a3b8',label:sev};
      html += `<div class="compare-card" style="border-top:3px solid ${meta.color}">
        <div class="period">${meta.label}</div>
        <div class="val" style="color:${meta.color}">${count}</div>
        <div class="lbl">条记录</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // 重复问题
  if (repeats.length) {
    html += `<div class="analysis-section">
      <h4>🔁 重复问题检测（同一分类出现≥2次）</h4>
      <table class="repeat-table">
        <tr><th>问题分类</th><th>出现次数</th><th>占比</th><th>建议</th></tr>`;
    repeats.forEach(([tag, count]) => {
      const pct = Math.round(count / allRecs.length * 100);
      let advice = '加强培训和日常抽查';
      if (tag === '话术问题') advice = '整理标准话术模板，每日晨会抽查背诵';
      else if (tag === '响应问题') advice = '设置响应时间提醒，高峰期增加人手';
      else if (tag === '流程问题') advice = '梳理SOP流程，制作流程检查清单';
      else if (tag === '态度问题') advice = '一对一沟通，了解原因并强调服务意识';
      else if (tag === '产品知识') advice = '定期产品培训，建立知识库';
      html += `<tr><td><b>${tag}</b></td><td class="count">${count}次</td><td>${pct}%</td><td>${advice}</td></tr>`;
    });
    html += `</table></div>`;
  }

  // 时间线
  html += `<div class="analysis-section">
    <h4>📅 质检记录时间线（最近10条）</h4>`;
  allRecs.slice(0, 10).forEach(r => {
    html += `<div class="timeline-item">
      <div class="timeline-dot ${r.status}"></div>
      <div class="timeline-content">
        <div class="timeline-date">${r.date} | ${r.shop}${r.customerId?' | 👤 '+r.customerId:''}</div>
        <div class="timeline-text">${escapeHtml(r.problem.substring(0, 60))}${r.problem.length>60?'...':''}</div>
        <div class="timeline-tags">
          ${r.tags.map(t => `<span class="timeline-tag ${t==='话术问题'?'tag-huashu':t==='响应问题'?'tag-xiangying':t==='流程问题'?'tag-liucheng':t==='态度问题'?'tag-taidu':t==='产品知识'?'tag-zhishi':'tag-huashu'}">${t}</span>`).join('')}
          <span class="timeline-tag" style="background:${r.severity==='一般'?'#fef3c7;color:#d97706':r.severity==='严重'?'#fee2e2;color:#dc2626':'#ede9fe;color:#7c3aed'}">${r.severity}</span>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // 智能建议
  html += `<div class="analysis-section">
    <h4>💡 智能改进建议</h4>`;
  suggestions.forEach(s => {
    html += `<div class="suggestion-box ${s.type==='alert'?'alert':s.type==='warn'?'warn':''}">
      <div class="suggestion-title">${s.title}</div>
      <div class="suggestion-text">${s.text}</div>
    </div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
}

function renderAllStaffSummary(el) {
  const allRecs = [...records].sort((a,b) => b.date.localeCompare(a.date));
  const pendingRecs = allRecs.filter(r => r.status === 'pending');
  const doneRecs = allRecs.filter(r => r.status === 'done');

  // 各客服统计
  const staffStats = {};
  allRecs.forEach(r => {
    if (!staffStats[r.staff]) staffStats[r.staff] = { count: 0, pending: 0, done: 0, tags: {} };
    staffStats[r.staff].count++;
    if (r.status === 'pending') staffStats[r.staff].pending++;
    else staffStats[r.staff].done++;
    r.tags.forEach(t => staffStats[r.staff].tags[t] = (staffStats[r.staff].tags[t]||0) + 1);
  });
  const staffList = Object.entries(staffStats).sort((a,b) => b[1].count - a[1].count);

  // 全局分类统计
  const tagCounts = {};
  allRecs.forEach(r => r.tags.forEach(t => tagCounts[t] = (tagCounts[t]||0) + 1));
  const tagList = Object.entries(tagCounts).sort((a,b) => b[1]-a[1]);
  const totalTags = tagList.reduce((s,[,c])=>s+c,0);

  // 全局严重度
  const sevCounts = {};
  allRecs.forEach(r => sevCounts[r.severity] = (sevCounts[r.severity]||0) + 1);

  // 全局重复问题（出现≥3次）
  const repeats = tagList.filter(([,c]) => c >= 3);

  // 近30天
  const thirtyDaysAgo = formatDate(new Date(Date.now() - 30*86400000));
  const recentRecs = allRecs.filter(r => r.date >= thirtyDaysAgo);

  let html = '';

  // 头部
  html += `<div class="analysis-header">
    <h2>📊 全部客服质检汇总报告</h2>
    <p>报告生成日期：${todayStr()} | 涉及客服${staffList.length}人 | 共${allRecs.length}条记录</p>
  </div>`;

  // 全局KPI
  html += `<div class="analysis-grid">
    <div class="analysis-kpi"><div class="num">${allRecs.length}</div><div class="lbl">质检总数</div></div>
    <div class="analysis-kpi"><div class="num" style="color:var(--red)">${pendingRecs.length}</div><div class="lbl">待讲解</div></div>
    <div class="analysis-kpi"><div class="num" style="color:var(--green)">${doneRecs.length}</div><div class="lbl">已讲解</div></div>
    <div class="analysis-kpi"><div class="num" style="color:var(--blue)">${Math.round(doneRecs.length/(allRecs.length||1)*100)}%</div><div class="lbl">全局闭环率</div></div>
  </div>`;

  // 客服排行
  html += `<div class="analysis-section">
    <h4>🏆 客服质检问题排行（问题数量由高到低）</h4>
    <div class="bar-chart">`;
  staffList.forEach(([name, stat], i) => {
    const pct = Math.round(stat.count / allRecs.length * 100);
    const color = i === 0 ? '#f43f5e' : i === 1 ? '#f59e0b' : i === 2 ? '#fb923c' : '#0d9488';
    html += `<div class="bar-row">
      <div class="bar-label">${name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${pct}%</div></div>
      <div class="bar-val">${stat.count}条</div>
    </div>`;
  });
  html += `</div></div>`;

  // 客服明细表
  html += `<div class="analysis-section">
    <h4>📋 客服质检明细表</h4>
    <table class="repeat-table">
      <tr><th>排名</th><th>客服</th><th>质检总数</th><th>待讲解</th><th>已讲解</th><th>闭环率</th><th>最常见问题</th></tr>`;
  staffList.forEach(([name, stat], i) => {
    const topTag = Object.entries(stat.tags).sort((a,b)=>b[1]-a[1])[0];
    const rate = Math.round(stat.done/(stat.count||1)*100);
    html += `<tr>
      <td><b>#${i+1}</b></td>
      <td>${name}</td>
      <td>${stat.count}</td>
      <td style="color:${stat.pending>0?'var(--red)':'var(--green)'}">${stat.pending}</td>
      <td>${stat.done}</td>
      <td style="color:${rate>=80?'var(--green)':rate>=50?'var(--yellow)':'var(--red)'}">${rate}%</td>
      <td>${topTag?topTag[0]+' ('+topTag[1]+'次)':'-'}</td>
    </tr>`;
  });
  html += `</table></div>`;

  // 全局问题分类排行
  if (tagList.length) {
    const colors = ['#f43f5e','#f59e0b','#fb923c','#0d9488','#38bdf8','#8b5cf6'];
    html += `<div class="analysis-section">
      <h4>📈 全局问题分类频率排行（所有客服）</h4>
      <div class="bar-chart">`;
    tagList.forEach(([tag, count], i) => {
      const pct = Math.round(count / totalTags * 100);
      html += `<div class="bar-row">
        <div class="bar-label">${tag}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}">${pct}%</div></div>
        <div class="bar-val">${count}次</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // 严重度分布
  if (Object.keys(sevCounts).length) {
    html += `<div class="analysis-section">
      <h4>⚡ 全局严重程度分布</h4>
      <div class="compare-row">`;
    const sevMeta = {'一般':{color:'#f59e0b',label:'一般提醒'},'严重':{color:'#f43f5e',label:'严重问题'},'严重需整改':{color:'#7c3aed',label:'严重需整改'}};
    Object.entries(sevCounts).forEach(([sev, count]) => {
      const meta = sevMeta[sev] || {color:'#94a3b8',label:sev};
      html += `<div class="compare-card" style="border-top:3px solid ${meta.color}">
        <div class="period">${meta.label}</div>
        <div class="val" style="color:${meta.color}">${count}</div>
        <div class="lbl">条记录</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // 高频重复问题（全局）
  if (repeats.length) {
    html += `<div class="analysis-section">
      <h4>🔥 高频问题类型（全局出现≥3次）</h4>
      <table class="repeat-table">
        <tr><th>问题分类</th><th>出现次数</th><th>涉及客服</th><th>占比</th><th>改进建议</th></tr>`;
    repeats.forEach(([tag, count]) => {
      const involved = [...new Set(allRecs.filter(r=>r.tags.includes(tag)).map(r=>r.staff))].length;
      const pct = Math.round(count / allRecs.length * 100);
      let advice = '全员加强培训和日常抽查';
      if (tag === '话术问题') advice = '整理全团队标准话术模板，每日晨会抽查背诵，每周话术演练';
      else if (tag === '响应问题') advice = '优化排班，高峰期增加人手，设置响应时间预警机制';
      else if (tag === '流程问题') advice = '统一SOP流程，制作流程检查清单，新人入职强制培训';
      else if (tag === '态度问题') advice = '开展服务意识培训，建立客户满意度回访机制';
      else if (tag === '产品知识') advice = '建立团队知识库，定期产品培训，制作FAQ手册';
      html += `<tr><td><b>${tag}</b></td><td class="count">${count}次</td><td>${involved}人</td><td>${pct}%</td><td>${advice}</td></tr>`;
    });
    html += `</table></div>`;
  }

  // 近30天动态
  html += `<div class="analysis-section">
    <h4>📅 近30天质检动态（共${recentRecs.length}条）</h4>`;
  if (recentRecs.length) {
    recentRecs.slice(0, 8).forEach(r => {
      html += `<div class="timeline-item">
        <div class="timeline-dot ${r.status}"></div>
        <div class="timeline-content">
          <div class="timeline-date">${r.date} | ${r.staff} | ${r.shop}</div>
          <div class="timeline-text">${escapeHtml(r.problem.substring(0, 50))}${r.problem.length>50?'...':''}</div>
          <div class="timeline-tags">
            ${r.tags.map(t => `<span class="timeline-tag ${t==='话术问题'?'tag-huashu':t==='响应问题'?'tag-xiangying':t==='流程问题'?'tag-liucheng':t==='态度问题'?'tag-taidu':t==='产品知识'?'tag-zhishi':'tag-huashu'}">${t}</span>`).join('')}
          </div>
        </div>
      </div>`;
    });
  } else {
    html += `<p style="color:#94a3b8;padding:10px">近30天暂无质检记录</p>`;
  }
  html += `</div>`;

  // 全局智能建议
  const globalSuggestions = [];
  if (repeats.length > 0) {
    const top = repeats[0];
    globalSuggestions.push({type:'alert', title:'🔥 团队高频问题', text:`「${top[0]}」在全团队出现 ${top[1]} 次，是最突出的共性问题。建议制定团队层面的改进方案，而非仅针对个别客服。`});
  }
  const lowRateStaff = staffList.filter(([,s]) => s.count >= 3 && Math.round(s.done/(s.count||1)*100) < 50);
  if (lowRateStaff.length > 0) {
    globalSuggestions.push({type:'warn', title:'📌 闭环率偏低客服', text:`${lowRateStaff.map(([n])=>n).join('、')} 的讲解闭环率低于50%，建议加强讲解执行力度。`});
  }
  const highStaff = staffList.filter(([,s]) => s.count >= 5);
  if (highStaff.length > 0) {
    globalSuggestions.push({type:'warn', title:'⚠️ 问题较多客服', text:`${highStaff.map(([n])=>n).join('、')} 的质检记录较多，建议重点关注并制定专项提升计划。`});
  }
  if (pendingRecs.length > 5) {
    globalSuggestions.push({type:'alert', title:'🚨 大量待讲解未闭环', text:`全团队还有 ${pendingRecs.length} 条记录未讲解，建议集中安排讲解时间，尽快闭环。`});
  }
  if (globalSuggestions.length === 0) {
    globalSuggestions.push({type:'ok', title:'✅ 团队整体良好', text:`全团队质检数据良好，暂无突出共性问题。建议持续保持现有管理节奏。`});
  }

  html += `<div class="analysis-section">
    <h4>💡 团队管理建议</h4>`;
  globalSuggestions.forEach(s => {
    html += `<div class="suggestion-box ${s.type==='alert'?'alert':s.type==='warn'?'warn':''}">
      <div class="suggestion-title">${s.title}</div>
      <div class="suggestion-text">${s.text}</div>
    </div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
}

function closeAnalysisModal() {
  document.getElementById('analysisModal').classList.remove('active');
}

/* ==================== 导出 ==================== */
function exportRecords() {
  const list = getFilteredRecords();
  if (!list.length) { alert('没有数据可导出'); return; }
  let csv = '\uFEFF';
  csv += '客服,客户ID,店铺,日期,问题分类,严重程度,客户问题,客服回复,问题描述,正确做法,备注,状态,讲解日期,讲解备注,客户问题截图数,客服回复截图数\n';
  list.forEach(r => {
    csv += `"${r.staff}","${r.customerId||''}","${r.shop}","${r.date}","${r.tags.join('、')}","${r.severity}","${(r.scene||'').replace(/"/g,'""')}","${(r.reply||'').replace(/"/g,'""')}","${(r.problem||'').replace(/"/g,'""')}","${(r.correct||'').replace(/"/g,'""')}","${(r.note||'').replace(/"/g,'""')}","${r.status==='pending'?'待讲解':'已讲解'}","${r.coachDate||''}","${r.coachNote||''}","${r.sceneImages?.length||0}","${r.replyImages?.length||0}"\n`;
  });
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '质检记录_' + todayStr() + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// 初始化
window.addEventListener('DOMContentLoaded', loadRecords);
</script>
