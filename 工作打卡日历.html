<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作打卡日历</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #f5f7fa;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 480px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  overflow: hidden;
}
.header {
  background: #2c3e50;
  color: #fff;
  padding: 20px;
  text-align: center;
}
.header h1 {
  font-size: 20px;
  margin-bottom: 12px;
  font-weight: 600;
}
.month-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}
.month-nav button {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  transition: background 0.2s;
}
.month-nav button:hover {
  background: rgba(255,255,255,0.4);
}
.month-nav span {
  font-size: 18px;
  font-weight: 500;
  min-width: 120px;
}
.progress-bar {
  background: #ecf0f1;
  height: 6px;
  border-radius: 3px;
  margin: 16px 20px 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #27ae60;
  border-radius: 3px;
  transition: width 0.3s;
}
.progress-text {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-top: 8px;
}
.calendar {
  padding: 16px 20px 20px;
}
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.weekdays div {
  text-align: center;
  font-size: 13px;
  color: #999;
  font-weight: 500;
  padding: 8px 0;
}
.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.day-cell {
  aspect-ratio: 1;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  border: 2px solid transparent;
}
.day-cell:hover {
  background: #e8f4f8;
}
.day-cell.today {
  border-color: #2c3e50;
  background: #f0f7ff;
}
.day-cell .day-num {
  font-size: 16px;
  font-weight: 600;
  color: #333;
}
.day-cell .day-status {
  font-size: 11px;
  margin-top: 2px;
}
.day-cell.all-done {
  background: #e8f5e9;
}
.day-cell.all-done .day-num {
  color: #27ae60;
}
.day-cell.partial {
  background: #fff8e1;
}
.day-cell.partial .day-num {
  color: #f39c12;
}
.day-cell.empty {
  cursor: default;
}
.day-cell.empty:hover {
  background: transparent;
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: flex-end;
  z-index: 100;
}
.modal-overlay.active {
  display: flex;
}
.modal {
  background: #fff;
  width: 100%;
  max-width: 480px;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  max-height: 70vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-header h2 {
  font-size: 18px;
  color: #333;
}
.modal-header .close-btn {
  background: none;
  border: none;
  font-size: 24px;
  color: #999;
  cursor: pointer;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-header .close-btn:hover {
  background: #f5f5f5;
}
.date-label {
  font-size: 14px;
  color: #666;
  margin-bottom: 16px;
  padding: 8px 12px;
  background: #f8f9fa;
  border-radius: 8px;
}
.task-list {
  margin-bottom: 16px;
}
.task-item {
  display: flex;
  align-items: center;
  padding: 12px;
  background: #f8f9fa;
  border-radius: 10px;
  margin-bottom: 8px;
  transition: background 0.2s;
}
.task-item:hover {
  background: #eef2f7;
}
.task-item input[type="checkbox"] {
  width: 20px;
  height: 20px;
  margin-right: 12px;
  cursor: pointer;
  accent-color: #27ae60;
}
.task-item .task-text {
  flex: 1;
  font-size: 15px;
  color: #333;
}
.task-item.completed .task-text {
  text-decoration: line-through;
  color: #999;
}
.task-item .delete-btn {
  background: none;
  border: none;
  color: #e74c3c;
  font-size: 18px;
  cursor: pointer;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.task-item:hover .delete-btn {
  opacity: 1;
}
.add-task {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.add-task input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.add-task input:focus {
  border-color: #2c3e50;
}
.add-task button {
  padding: 12px 20px;
  background: #2c3e50;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s;
}
.add-task button:hover {
  background: #34495e;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #999;
  font-size: 14px;
}

@media (min-width: 500px) {
  .modal-overlay {
    align-items: center;
  }
  .modal {
    border-radius: 16px;
    max-height: 60vh;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 工作打卡日历</h1>
    <div class="month-nav">
      <button onclick="prevMonth()">‹</button>
      <span id="monthLabel"></span>
      <button onclick="nextMonth()">›</button>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText"></div>
  <div class="calendar">
    <div class="weekdays">
      <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
    </div>
    <div class="days" id="calendarDays"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>📝 今日打卡</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="date-label" id="dateLabel"></div>
    <div id="taskContainer"></div>
    <div class="add-task">
      <input type="text" id="newTaskInput" placeholder="添加今日工作..." onkeypress="if(event.key==='Enter')addTask()">
      <button onclick="addTask()">添加</button>
    </div>
  </div>
</div>

<script>
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth();
let selectedDate = null;
let todayStr = formatDate(currentDate);

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTasks(dateStr) {
  const data = localStorage.getItem('workCheck_' + dateStr);
  return data ? JSON.parse(data) : [];
}

function saveTasks(dateStr, tasks) {
  localStorage.setItem('workCheck_' + dateStr, JSON.stringify(tasks));
}

function getMonthProgress(year, month) {
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let totalTasks = 0;
  let completedTasks = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tasks = getTasks(dateStr);
    totalTasks += tasks.length;
    completedTasks += tasks.filter(t => t.done).length;
  }
  return { totalTasks, completedTasks, rate: totalTasks > 0 ? Math.round(completedTasks / totalTasks * 100) : 0 };
}

function renderCalendar() {
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startDayOfWeek = firstDay.getDay();
  
  document.getElementById('monthLabel').textContent = `${currentYear}年 ${currentMonth + 1}月`;
  
  const daysEl = document.getElementById('calendarDays');
  daysEl.innerHTML = '';
  
  for (let i = 0; i < startDayOfWeek; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    daysEl.appendChild(empty);
  }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tasks = getTasks(dateStr);
    const completed = tasks.filter(t => t.done).length;
    const total = tasks.length;
    
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (dateStr === todayStr) cell.classList.add('today');
    if (total > 0 && completed === total) cell.classList.add('all-done');
    else if (total > 0 && completed > 0) cell.classList.add('partial');
    
    cell.innerHTML = `
      <div class="day-num">${d}</div>
      <div class="day-status">${total > 0 ? `${completed}/${total}` : ''}</div>
    `;
    cell.onclick = () => openModal(dateStr);
    daysEl.appendChild(cell);
  }
  
  const progress = getMonthProgress(currentYear, currentMonth);
  document.getElementById('progressFill').style.width = progress.rate + '%';
  document.getElementById('progressText').textContent = 
    progress.totalTasks > 0 
      ? `本月完成 ${progress.completedTasks}/${progress.totalTasks} 项任务 (${progress.rate}%)`
      : '本月还没有添加任务';
}

function openModal(dateStr) {
  selectedDate = dateStr;
  const date = new Date(dateStr);
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('dateLabel').textContent = 
    `${dateStr} ${weekdays[date.getDay()]}`;
  renderTasks();
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('newTaskInput').focus();
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
    selectedDate = null;
  }
}

function renderTasks() {
  const tasks = getTasks(selectedDate);
  const container = document.getElementById('taskContainer');
  
  if (tasks.length === 0) {
    container.innerHTML = '<div class="empty-state">还没有任务，添加今日工作吧</div>';
    return;
  }
  
  container.innerHTML = '<div class="task-list">' + tasks.map((task, idx) => `
    <div class="task-item ${task.done ? 'completed' : ''}">
      <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${idx})">
      <span class="task-text">${escapeHtml(task.text)}</span>
      <button class="delete-btn" onclick="deleteTask(${idx})">×</button>
    </div>
  `).join('') + '</div>';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function addTask() {
  const input = document.getElementById('newTaskInput');
  const text = input.value.trim();
  if (!text) return;
  const tasks = getTasks(selectedDate);
  tasks.push({ text, done: false });
  saveTasks(selectedDate, tasks);
  input.value = '';
  renderTasks();
  renderCalendar();
}

function toggleTask(idx) {
  const tasks = getTasks(selectedDate);
  tasks[idx].done = !tasks[idx].done;
  saveTasks(selectedDate, tasks);
  renderTasks();
  renderCalendar();
}

function deleteTask(idx) {
  const tasks = getTasks(selectedDate);
  tasks.splice(idx, 1);
  saveTasks(selectedDate, tasks);
  renderTasks();
  renderCalendar();
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

renderCalendar();
</script>
</body>
</html>
