<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作打卡日历 Pro</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--text:#333;--text2:#666;--border:#e0e0e0;--primary:#2c3e50;--primary-light:#34495e;--green:#27ae60;--red:#e74c3c;--blue:#3498db;--yellow:#f39c12;--purple:#9b59b6;--orange:#e67e22;}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Microsoft YaHei",sans-serif; background:var(--bg); min-height:100vh; color:var(--text); }
.container { max-width:100%; margin:0 auto; }
.header { background:var(--primary); color:#fff; padding:12px 16px; }

.theme-blue { --primary:#1a5276; --primary-light:#2874a6; --bg:#ebf5fb; }
.theme-green { --primary:#1e8449; --primary-light:#27ae60; --bg:#eafaf1; }
.theme-purple { --primary:#6c3483; --primary-light:#8e44ad; --bg:#f4ecf7; }
.theme-red { --primary:#922b21; --primary-light:#c0392b; --bg:#fdedec; }
.theme-dark { --bg:#1a1a2e; --card:#16213e; --text:#eee; --text2:#aaa; --border:#2a2a4a; --primary:#4cc9f0; --primary-light:#6dd5fa; }
.header h1 { font-size:17px; margin-bottom:8px; display:flex; justify-content:center; align-items:center; position:relative; }
.header h1 .title-text { text-align:center; }
.header h1 .icons { display:flex; gap:6px; position:absolute; right:0; }
.header h1 .icons button, .header h1 .icons select { background:rgba(255,255,255,.2); border:none; color:#fff; height:32px; border-radius:16px; cursor:pointer; font-size:13px; padding:0 12px; }
.month-nav { display:flex; justify-content:center; align-items:center; gap:16px; }
.month-nav button { background:rgba(255,255,255,.2); border:none; color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:18px; }
.month-nav span { font-size:16px; font-weight:500; min-width:120px; text-align:center; }
.progress-bar { background:rgba(255,255,255,.2); height:5px; border-radius:3px; margin-top:8px; overflow:hidden; }
.progress-fill { height:100%; background:var(--green); border-radius:3px; transition:width .3s; }
.progress-text { font-size:12px; color:rgba(255,255,255,.8); margin-top:6px; display:flex; justify-content:space-between; }

.main-layout { display:flex; gap:12px; padding:12px; max-width:1400px; margin:0 auto; }
.sidebar { width:280px; flex-shrink:0; }
.calendar-area { flex:1; min-width:0; }

.card { background:var(--card); border-radius:12px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.card h3 { font-size:14px; margin-bottom:10px; display:flex; align-items:center; gap:6px; color:var(--primary); }

.weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:6px; }
.weekdays div { text-align:center; font-size:12px; color:var(--text2); padding:6px 0; font-weight:500; }
.days { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.day-cell { aspect-ratio:1.1; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; border:2px solid transparent; position:relative; font-size:12px; background:var(--card); }
.day-cell:hover { background:#e8f4f8; }
.day-cell.today { border-color:var(--primary); background:#f0f7ff; }
.day-cell .day-num { font-size:15px; font-weight:600; }
.day-cell .day-status { font-size:10px; margin-top:2px; opacity:.7; }
.day-cell.all-done { background:rgba(39,174,96,.12); color:var(--green); }
.day-cell.partial { background:rgba(243,156,18,.1); color:var(--yellow); }
.day-cell.empty { cursor:default; opacity:0; }
.day-cell .dot { width:5px; height:5px; border-radius:50%; position:absolute; bottom:4px; }
.day-cell .dot.r { background:var(--red); }
.day-cell .dot.y { background:var(--yellow); }
.day-cell .dot.g { background:var(--green); }

.template-list { display:flex; flex-direction:column; gap:8px; }
.template-item { padding:12px; background:#f8f9fa; border-radius:10px; cursor:pointer; border:2px solid transparent; transition:all .2s; }
.template-item:hover { border-color:var(--primary); background:#f0f7ff; }
.template-item .t-name { font-size:14px; font-weight:600; margin-bottom:4px; }
.template-item .t-tasks { font-size:11px; color:var(--text2); line-height:1.6; }
.template-item .t-tag { display:inline-block; padding:1px 6px; border-radius:8px; font-size:10px; background:rgba(52,152,219,.1); color:var(--blue); margin-right:4px; margin-top:4px; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; justify-content:center; align-items:center; z-index:100; }
.modal-overlay.active { display:flex; }
.modal { background:var(--card); width:92%; max-width:600px; max-height:85vh; border-radius:16px; padding:20px; overflow-y:auto; animation:fadeIn .2s; }
@keyframes fadeIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.modal-header h2 { font-size:16px; }
.close-btn { background:none; border:none; font-size:22px; color:var(--text2); cursor:pointer; width:32px; height:32px; border-radius:50%; }
.date-label { font-size:13px; color:var(--text2); margin-bottom:10px; padding:8px 12px; background:var(--bg); border-radius:8px; display:flex; justify-content:space-between; align-items:center; }

.task-item { display:flex; align-items:center; padding:10px 12px; background:var(--bg); border-radius:10px; margin-bottom:6px; gap:10px; }
.task-item input[type=checkbox] { width:18px; height:18px; cursor:pointer; accent-color:var(--green); flex-shrink:0; }
.task-item .task-body { flex:1; min-width:0; }
.task-item .task-text { font-size:14px; word-break:break-all; }
.task-item .task-tags { display:flex; gap:4px; margin-top:3px; flex-wrap:wrap; }
.task-item .tag { font-size:10px; padding:2px 6px; border-radius:10px; }
.task-item .tag.p1 { background:rgba(231,76,60,.12); color:var(--red); }
.task-item .tag.p2 { background:rgba(243,156,18,.12); color:var(--yellow); }
.task-item .tag.p3 { background:rgba(52,152,219,.12); color:var(--blue); }
.task-item .tag.type { background:rgba(155,89,182,.1); color:var(--purple); }
.task-item.completed .task-text { text-decoration:line-through; color:var(--text2); opacity:.6; }
.task-item .delete-btn { background:none; border:none; color:var(--red); font-size:16px; cursor:pointer; opacity:0; width:24px; }
.task-item:hover .delete-btn { opacity:1; }

.add-task { display:flex; gap:6px; margin-top:8px; }
.add-task input { flex:1; padding:10px 12px; border:2px solid var(--border); border-radius:10px; font-size:14px; outline:none; }
.add-task input:focus { border-color:var(--primary); }
.add-task button { padding:10px 16px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-size:14px; cursor:pointer; }

.meta-row { display:flex; gap:6px; margin-bottom:8px; }
.meta-row select { flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); font-size:12px; }

.review-box { margin-top:10px; padding:12px; background:var(--bg); border-radius:10px; }
.review-box label { font-size:11px; color:var(--text2); display:block; margin-bottom:3px; margin-top:6px; }
.review-box textarea { width:100%; padding:8px; border:1px solid var(--border); border-radius:8px; font-size:13px; resize:vertical; min-height:36px; outline:none; }
.review-box textarea:focus { border-color:var(--primary); }

.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
.stat-card { background:var(--card); padding:10px; border-radius:10px; text-align:center; border:1px solid var(--border); }
.stat-card .stat-val { font-size:18px; font-weight:700; color:var(--primary); }
.stat-card .stat-label { font-size:11px; color:var(--text2); margin-top:2px; }

.chart-box { background:var(--card); padding:12px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border); }
.chart-box h3 { font-size:13px; margin-bottom:8px; color:var(--text2); }
.bar-chart { display:flex; align-items:flex-end; gap:4px; height:70px; padding-bottom:18px; position:relative; }
.bar { flex:1; background:var(--primary); border-radius:4px 4px 0 0; min-height:4px; position:relative; opacity:.8; }
.bar-label { position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--text2); white-space:nowrap; }
.bar-val { position:absolute; top:-12px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--text2); }

.memo-area { width:100%; min-height:120px; padding:12px; border:1px solid var(--border); border-radius:10px; font-size:14px; resize:vertical; outline:none; background:var(--card); }
.memo-area:focus { border-color:var(--primary); }
.memo-list { margin-top:10px; }
.memo-item { padding:10px; background:var(--bg); border-radius:10px; margin-bottom:8px; position:relative; }
.memo-item .time { font-size:11px; color:var(--text2); margin-bottom:4px; }
.memo-item .text { font-size:14px; }
.memo-item .del { position:absolute; top:8px; right:8px; color:var(--red); cursor:pointer; font-size:16px; opacity:0; }
.memo-item:hover .del { opacity:1; }

.empty-state { text-align:center; padding:30px; color:var(--text2); font-size:13px; }
.bottom-actions { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); padding:8px; display:flex; justify-content:center; gap:16px; z-index:50; }
.bottom-actions button { background:none; border:none; color:var(--text2); font-size:13px; cursor:pointer; padding:8px 16px; border-radius:8px; }
.bottom-actions button.active { color:var(--primary); background:rgba(52,152,219,.1); font-weight:500; }
.page { display:none; padding-bottom:60px; }
.page.active { display:block; }

.single-task { display:inline-block; padding:6px 12px; background:#f0f7ff; border-radius:20px; font-size:12px; margin:4px 4px 0 0; cursor:pointer; border:1px solid #dbeafe; color:var(--primary); }
.single-task:hover { background:var(--primary); color:#fff; }
.clear-day { background:var(--red); color:#fff; border:none; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; }

@media(max-width:900px){
  .main-layout { flex-direction:column; padding:8px; }
  .sidebar { width:100%; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1><span class="title-text">📋 工作打卡日历 Pro</span>
<div class="icons">
<select id="themeSelect" onchange="changeTheme(this.value)" title="切换主题">
<option value="default">🎨 默认</option>
<option value="blue">🔵 商务蓝</option>
<option value="green">🟢 清新绿</option>
<option value="purple">🟣 优雅紫</option>
<option value="red">🔴 活力红</option>
<option value="dark">🌙 夜间</option>
</select>
<button onclick="showPage('memo')" title="备忘录">📝</button>
<button onclick="showPage('stats')" title="统计">📊</button>
</div>
</h1>
<div class="month-nav">
<button onclick="prevMonth()">‹</button>
<span id="monthLabel"></span>
<button onclick="nextMonth()">›</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text"><span id="progressText"></span><span id="streakText"></span></div>
</div>

<div class="main-layout">
<div class="sidebar">
<div class="card">
<h3>📋 工作模板库</h3>
<div class="template-list" id="templateList"></div>
</div>
<div class="card">
<h3>➕ 单个任务</h3>
<div id="singleTasks"></div>
</div>
</div>

<div class="calendar-area">
<div class="page active" id="page-calendar">
<div class="card" style="padding:10px">
<div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
<div class="days" id="calendarDays"></div>
</div>
</div>

<div class="page" id="page-stats">
<div class="stats-grid">
<div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-label">本月任务</div></div>
<div class="stat-card"><div class="stat-val" id="statDone">0</div><div class="stat-label">已完成</div></div>
<div class="stat-card"><div class="stat-val" id="statRate">0%</div><div class="stat-label">完成率</div></div>
<div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-label">连续打卡</div></div>
</div>
<div class="chart-box"><h3>📈 近7天完成率</h3><div class="bar-chart" id="weekChart"></div></div>
<div class="chart-box"><h3>📊 工作类型分布</h3><div class="bar-chart" id="typeChart"></div></div>
</div>

<div class="page" id="page-memo">
<div class="card">
<h3>📝 备忘录 & 灵感记录</h3>
<textarea class="memo-area" id="memoInput" placeholder="记录重要事项、突发灵感、待办备忘..."></textarea>
<button onclick="addMemo()" style="margin-top:8px;padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;">添加记录</button>
<div class="memo-list" id="memoList"></div>
</div>
</div>
</div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-header"><h2 id="modalTitle">📝 今日打卡</h2><button class="close-btn" onclick="closeModal()">×</button></div>
<div class="date-label"><span id="dateLabel"></span><button class="clear-day" onclick="clearDay()">🗑️ 清空当日</button></div>

<div style="margin-bottom:12px;">
<div style="font-size:12px;color:var(--text2);margin-bottom:6px;">📋 快速选择模板：</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;" id="modalTemplates"></div>
</div>

<div class="meta-row">
<select id="prioritySelect"><option value="">优先级</option><option value="p1">🔴 紧急重要</option><option value="p2">🟡 重要不紧急</option><option value="p3">🟢 常规</option></select>
<select id="typeSelect"><option value="">类型</option><option value="培训">培训</option><option value="质检">质检</option><option value="数据分析">数据分析</option><option value="团队管理">团队管理</option><option value="排班考勤">排班考勤</option><option value="扣罚奖励">扣罚奖励</option><option value="日常">日常</option></select>
</div>
<div id="taskContainer"></div>
<div class="add-task"><input type="text" id="newTaskInput" placeholder="添加任务..." onkeypress="if(event.key==='Enter')addTask()"><button onclick="addTask()">添加</button></div>
<div class="review-box">
<label>💡 今日收获</label><textarea id="reviewGain" placeholder="学到了什么..."></textarea>
<label>⚠️ 遇到的问题</label><textarea id="reviewProblem" placeholder="遇到了什么问题..."></textarea>
<label>🚀 明日改进</label><textarea id="reviewImprove" placeholder="明天怎么改进..."></textarea>
</div>
<div style="margin-top:14px;text-align:center;">
<button onclick="saveAndClose()" style="padding:12px 40px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600;">💾 保存并关闭</button>
</div>
</div>
</div>

<div class="bottom-actions">
<button class="active" onclick="showPage('calendar')" id="nav-cal">📅 日历</button>
<button onclick="showPage('stats')" id="nav-stats">📊 统计</button>
<button onclick="showPage('memo')" id="nav-memo">📝 备忘</button>
</div>

<script>
const TEMPLATES=[
{name:"培训日",desc:"新人培训全流程",tasks:["准备培训材料","话术抽查","实战演练","新人答疑","培训复盘"],tags:["培训","团队管理"]},
{name:"质检日",desc:"客服质量检查",tasks:["抽查聊天记录","评分记录","反馈给客服","更新话术库","问题汇总"],tags:["质检","数据分析"]},
{name:"周报日",desc:"周数据汇总",tasks:["汇总本周数据","分析转化率","整理问题清单","下周计划","周会准备"],tags:["数据分析","日常"]},
{name:"月度管理日",desc:"排班+考勤+扣罚奖励统计",tasks:["制作下月排班表","统计月度考勤","登记本月扣罚","统计本月奖励","月度数据汇总"],tags:["排班考勤","扣罚奖励","团队管理"]},
{name:"优化日",desc:"话术与流程优化",tasks:["转化率分析","话术优化","测试新方案","数据验证","方案归档"],tags:["数据分析","日常"]},
{name:"日常管理",desc:"常规管理工作",tasks:["查看日报","处理客服问题","处理客户投诉","临时任务协调","明日计划"],tags:["日常","团队管理"]}
];

const SINGLE_TASKS = [
"抽查客服聊天记录","更新话术库","处理客户投诉",
"新人入职培训","月度排班调整","统计客服考勤",
"登记扣罚记录","统计奖励名单","转化率分析",
"团队周会","处理退货纠纷","优化回复话术",
"检查库存预警","核对订单数据","整理培训资料"
];

let currentDate=new Date(),currentYear=currentDate.getFullYear(),currentMonth=currentDate.getMonth(),selectedDate=null;
let todayStr=formatDate(currentDate);

function formatDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getTasks(dateStr){const data=localStorage.getItem('workPro_'+dateStr);return data?JSON.parse(data):[];}
function saveTasks(dateStr,tasks){localStorage.setItem('workPro_'+dateStr,JSON.stringify(tasks));}
function getReview(dateStr){const data=localStorage.getItem('workProReview_'+dateStr);return data?JSON.parse(data):{gain:'',problem:'',improve:''};}
function saveReview(dateStr,r){localStorage.setItem('workProReview_'+dateStr,JSON.stringify(r));}
function getMemos(){const data=localStorage.getItem('workProMemos');return data?JSON.parse(data):[];}
function saveMemos(m){localStorage.setItem('workProMemos',JSON.stringify(m));}

function getMonthProgress(year,month){
const daysInMonth=new Date(year,month+1,0).getDate();
let totalTasks=0,completedTasks=0;
for(let d=1;d<=daysInMonth;d++){
const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const tasks=getTasks(dateStr);totalTasks+=tasks.length;completedTasks+=tasks.filter(t=>t.done).length;
}
return{totalTasks,completedTasks,rate:totalTasks>0?Math.round(completedTasks/totalTasks*100):0};
}

function calcStreak(){
let streak=0;const d=new Date();
for(let i=0;i<365;i++){
const dateStr=formatDate(new Date(d.getFullYear(),d.getMonth(),d.getDate()-i));
const tasks=getTasks(dateStr);const completed=tasks.filter(t=>t.done).length;
if(tasks.length>0&&completed===tasks.length)streak++;else if(i>0)break;
}
return streak;
}

function renderCalendar(){
const firstDay=new Date(currentYear,currentMonth,1),lastDay=new Date(currentYear,currentMonth+1,0);
const daysInMonth=lastDay.getDate(),startDayOfWeek=firstDay.getDay();
document.getElementById('monthLabel').textContent=`${currentYear}年 ${currentMonth+1}月`;
const daysEl=document.getElementById('calendarDays');daysEl.innerHTML='';
for(let i=0;i<startDayOfWeek;i++){const empty=document.createElement('div');empty.className='day-cell empty';daysEl.appendChild(empty);}
for(let d=1;d<=daysInMonth;d++){
const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const tasks=getTasks(dateStr);const completed=tasks.filter(t=>t.done).length;const total=tasks.length;
const cell=document.createElement('div');cell.className='day-cell';
if(dateStr===todayStr)cell.classList.add('today');
if(total>0&&completed===total)cell.classList.add('all-done');
else if(total>0&&completed>0)cell.classList.add('partial');
let dotHtml='';
if(total>0){const hasP1=tasks.some(t=>t.priority==='p1'&&!t.done);const hasP2=tasks.some(t=>t.priority==='p2'&&!t.done);if(hasP1)dotHtml='<div class="dot r"></div>';else if(hasP2)dotHtml='<div class="dot y"></div>';else dotHtml='<div class="dot g"></div>';}
cell.innerHTML=`<div class="day-num">${d}</div>${total>0?`<div class="day-status">${completed}/${total}</div>`:''}${dotHtml}`;
cell.onclick=()=>openModal(dateStr);daysEl.appendChild(cell);
}
const progress=getMonthProgress(currentYear,currentMonth);
document.getElementById('progressFill').style.width=progress.rate+'%';
document.getElementById('progressText').textContent=progress.totalTasks>0?`本月完成 ${progress.completedTasks}/${progress.totalTasks} (${progress.rate}%)`:'本月还没有任务';
document.getElementById('streakText').textContent=`🔥 ${calcStreak()}天`;
}

function openModal(dateStr){
selectedDate=dateStr;const date=new Date(dateStr);
const weekdays=['周日','周一','周二','周三','周四','周五','周六'];
document.getElementById('modalTitle').textContent='📝 今日打卡';
document.getElementById('dateLabel').textContent=`${dateStr} ${weekdays[date.getDay()]}`;
const review=getReview(dateStr);
document.getElementById('reviewGain').value=review.gain;
document.getElementById('reviewProblem').value=review.problem;
document.getElementById('reviewImprove').value=review.improve;
renderTasks();
renderModalTemplates();
document.getElementById('modalOverlay').classList.add('active');
document.getElementById('newTaskInput').focus();
}

function renderModalTemplates(){
const container=document.getElementById('modalTemplates');
container.innerHTML=TEMPLATES.map((t,i)=>`<button onclick="applyTemplate(${i})" style="padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;color:var(--text);">${t.name}</button>`).join('');
}

function closeModal(event){if(!event||event.target===document.getElementById('modalOverlay')){
document.getElementById('modalOverlay').classList.remove('active');selectedDate=null;
}}

function saveAndClose(){
if(selectedDate){
const r={gain:document.getElementById('reviewGain').value,problem:document.getElementById('reviewProblem').value,improve:document.getElementById('reviewImprove').value};
saveReview(selectedDate,r);
}
document.getElementById('modalOverlay').classList.remove('active');selectedDate=null;
renderCalendar();
}

function clearDay(){
if(!selectedDate)return;
if(!confirm(`确定清空 ${selectedDate} 的所有任务和记录？`))return;
localStorage.removeItem('workPro_'+selectedDate);
localStorage.removeItem('workProReview_'+selectedDate);
renderTasks();renderCalendar();
}

function renderTasks(){
const tasks=getTasks(selectedDate);const container=document.getElementById('taskContainer');
if(tasks.length===0){container.innerHTML='<div class="empty-state">还没有任务，添加今日工作吧</div>';return;}
container.innerHTML='<div class="task-list">'+tasks.map((task,idx)=>{
let tagHtml='';if(task.priority==='p1')tagHtml='<span class="tag p1">紧急</span>';else if(task.priority==='p2')tagHtml='<span class="tag p2">重要</span>';else if(task.priority==='p3')tagHtml='<span class="tag p3">常规</span>';if(task.type)tagHtml+=`<span class="tag type">${task.type}</span>`;
return`<div class="task-item ${task.done?'completed':''}"><input type="checkbox" ${task.done?'checked':''} onchange="toggleTask(${idx})"><div class="task-body"><div class="task-text">${escapeHtml(task.text)}</div><div class="task-tags">${tagHtml}</div></div><button class="delete-btn" onclick="deleteTask(${idx})">×</button></div>`;
}).join('')+'</div>';
}

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

function addTask(){
const input=document.getElementById('newTaskInput');const text=input.value.trim();if(!text)return;
const priority=document.getElementById('prioritySelect').value;
const type=document.getElementById('typeSelect').value;
const tasks=getTasks(selectedDate);tasks.push({text,done:false,priority,type});
saveTasks(selectedDate,tasks);input.value='';renderTasks();renderCalendar();
}

function toggleTask(idx){
const tasks=getTasks(selectedDate);tasks[idx].done=!tasks[idx].done;
saveTasks(selectedDate,tasks);renderTasks();renderCalendar();
}

function deleteTask(idx){
const tasks=getTasks(selectedDate);tasks.splice(idx,1);
saveTasks(selectedDate,tasks);renderTasks();renderCalendar();
}

function renderTemplates(){
const list=document.getElementById('templateList');
list.innerHTML=TEMPLATES.map((t,i)=>`<div class="template-item" onclick="applyTemplate(${i})"><div class="t-name">${t.name}</div><div class="t-tasks">${t.tasks.join('、')}</div><div>${t.tags.map(tag=>`<span class="t-tag">${tag}</span>`).join('')}</div></div>`).join('');
}

function renderSingleTasks(){
const container=document.getElementById('singleTasks');
container.innerHTML=SINGLE_TASKS.map(t=>`<span class="single-task" onclick="addSingleTask('${t}')">+ ${t}</span>`).join('');
}

function addSingleTask(text){
if(!selectedDate){selectedDate=formatDate(new Date());}
const tasks=getTasks(selectedDate);tasks.push({text,done:false,priority:'p3',type:'日常'});
saveTasks(selectedDate,tasks);renderTasks();renderCalendar();
}

function applyTemplate(idx){
if(!selectedDate){selectedDate=formatDate(new Date());}
const t=TEMPLATES[idx];const tasks=getTasks(selectedDate);
t.tasks.forEach(task=>tasks.push({text:task,done:false,priority:'p2',type:t.tags[0]}));
saveTasks(selectedDate,tasks);renderTasks();renderCalendar();
}

function showPage(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.bottom-actions button').forEach(b=>b.classList.remove('active'));
if(page==='calendar'){document.getElementById('page-calendar').classList.add('active');document.getElementById('nav-cal').classList.add('active');}
if(page==='stats'){document.getElementById('page-stats').classList.add('active');document.getElementById('nav-stats').classList.add('active');renderStats();}
if(page==='memo'){document.getElementById('page-memo').classList.add('active');document.getElementById('nav-memo').classList.add('active');renderMemos();}
}

function changeTheme(theme){
document.body.classList.remove('theme-blue','theme-green','theme-purple','theme-red','theme-dark');
if(theme!=='default')document.body.classList.add('theme-'+theme);
localStorage.setItem('workProTheme',theme);
}

const savedTheme=localStorage.getItem('workProTheme');
if(savedTheme&&savedTheme!=='default'){document.body.classList.add('theme-'+savedTheme);document.getElementById('themeSelect').value=savedTheme;}

function renderStats(){
const progress=getMonthProgress(currentYear,currentMonth);
document.getElementById('statTotal').textContent=progress.totalTasks;
document.getElementById('statDone').textContent=progress.completedTasks;
document.getElementById('statRate').textContent=progress.rate+'%';
document.getElementById('statStreak').textContent=calcStreak();
renderWeekChart();renderTypeChart();
}

function renderWeekChart(){
const chart=document.getElementById('weekChart');chart.innerHTML='';
const d=new Date();const days=[];
for(let i=6;i>=0;i--){
const date=new Date(d.getFullYear(),d.getMonth(),d.getDate()-i);
const dateStr=formatDate(date);const tasks=getTasks(dateStr);
const rate=tasks.length>0?Math.round(tasks.filter(t=>t.done).length/tasks.length*100):0;
days.push({label:`${date.getMonth()+1}/${date.getDate()}`,rate});
}
const maxRate=Math.max(...days.map(d=>d.rate),1);
days.forEach(day=>{
const h=Math.max((day.rate/maxRate)*60,4);
const bar=document.createElement('div');bar.className='bar';bar.style.height=h+'px';
bar.innerHTML=`<div class="bar-val">${day.rate}%</div><div class="bar-label">${day.label}</div>`;
chart.appendChild(bar);
});
}

function renderTypeChart(){
const chart=document.getElementById('typeChart');chart.innerHTML='';
const types={};const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
for(let d=1;d<=daysInMonth;d++){
const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const tasks=getTasks(dateStr);tasks.forEach(t=>{if(t.type){types[t.type]=(types[t.type]||0)+(t.done?1:.5);}});
}
const entries=Object.entries(types).sort((a,b)=>b[1]-a[1]).slice(0,7);
const maxVal=Math.max(...entries.map(e=>e[1]),1);
const colors=['#3498db','#27ae60','#f39c12','#e74c3c','#9b59b6','#e67e22','#1abc9c'];
entries.forEach((entry,idx)=>{
const h=Math.max((entry[1]/maxVal)*60,4);
const bar=document.createElement('div');bar.className='bar';bar.style.height=h+'px';bar.style.background=colors[idx%colors.length];
bar.innerHTML=`<div class="bar-val">${Math.round(entry[1])}</div><div class="bar-label">${entry[0]}</div>`;
chart.appendChild(bar);
});
if(entries.length===0)chart.innerHTML='<div class="empty-state" style="height:60px;display:flex;align-items:center">暂无数据</div>';
}

function addMemo(){
const input=document.getElementById('memoInput');const text=input.value.trim();if(!text)return;
const memos=getMemos();memos.unshift({text,time:new Date().toLocaleString('zh-CN')});
saveMemos(memos);input.value='';renderMemos();
}

function renderMemos(){
const memos=getMemos();const list=document.getElementById('memoList');
if(memos.length===0){list.innerHTML='<div class="empty-state">还没有记录</div>';return;}
list.innerHTML=memos.map((m,i)=>`<div class="memo-item"><div class="time">${m.time}</div><div class="text">${escapeHtml(m.text)}</div><span class="del" onclick="deleteMemo(${i})">×</span></div>`).join('');
}

function deleteMemo(idx){
const memos=getMemos();memos.splice(idx,1);saveMemos(memos);renderMemos();
}

function prevMonth(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();}
function nextMonth(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderCalendar();}

renderCalendar();renderTemplates();renderSingleTasks();
</script>
</body>
</html>
