<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尤赫客服工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            margin: 0 auto 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            background: white;
        }
        .header-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header-subtitle { font-size: 15px; opacity: 0.9; }
        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 24px;
            align-items: flex-start;
        }
        .sidebar {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .sidebar-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            color: white;
        }
        .sidebar-card h3 { font-size: 16px; margin-bottom: 12px; opacity: 0.9; }
        .sidebar-card p { font-size: 13px; line-height: 1.6; opacity: 0.8; }
        .sidebar-link {
            display: block;
            padding: 8px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            margin-top: 8px;
            transition: background 0.3s;
        }
        .sidebar-link:hover { background: rgba(255,255,255,0.3); }
        .tools-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            min-width: 0;
        }
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .tool-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
        }
        .tool-card:nth-child(1) .tool-icon { background: linear-gradient(135deg, #667eea, #764ba2); }
        .tool-card:nth-child(2) .tool-icon { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .tool-card:nth-child(3) .tool-icon { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .tool-card:nth-child(4) .tool-icon { background: linear-gradient(135deg, #fa709a, #fee140); }
        .tool-name { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        .tool-desc { font-size: 14px; color: #666; line-height: 1.5; }
        .tool-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 12px;
        }
        .status-ready { background: #e8f5e9; color: #2e7d32; }
        .status-beta { background: #fff3e0; color: #e65100; }
        .footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
        @media (max-width: 960px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
            .sidebar-card { flex: 1; min-width: 200px; }
            .tools-grid { grid-template-columns: 1fr; }
            .header-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="miusou-logo.jpg" class="logo-img" alt="弥生logo" id="logo">
        <h1 class="header-title">尤赫客服工作台</h1>
        <p class="header-subtitle">日常工具集合</p>
    </div>
    <div class="main-wrapper">
        <div class="sidebar">
            <div class="sidebar-card">
                <h3>📢 公告栏</h3>
                <p>库存数据每日更新<br>请及时查看最新缺货信息</p>
            </div>
            <div class="sidebar-card">
                <h3>📝 快捷入口</h3>
                <a href="#" class="sidebar-link">培训课件</a>
                <a href="#" class="sidebar-link">客服手册</a>
                <a href="#" class="sidebar-link">常见问题</a>
            </div>
        </div>
        <div class="tools-grid">
            <a href="https://yangru2026.github.io/degree-converter/" class="tool-card" target="_blank">
                <div class="tool-icon">🔄</div>
                <div class="tool-name">度数换算</div>
                <div class="tool-desc">快速换算不同品牌度数<br>专业准确，一键复制回复</div>
                <span class="tool-status status-ready">✅ 已上线</span>
            </a>
            <a href="https://yangru2026.github.io/stock-monitor/" class="tool-card" target="_blank">
                <div class="tool-icon">📊</div>
                <div class="tool-name">库存看板</div>
                <div class="tool-desc">缺货花色补货情况查询<br>实时库存，一目了然</div>
                <span class="tool-status status-beta">🔄 完善中</span>
            </a>
            <a href="https://yangru2026.github.io/lens-library/" class="tool-card" target="_blank">
                <div class="tool-icon">🎨</div>
                <div class="tool-name">花色素材库</div>
                <div class="tool-desc">美瞳花色上眼图素材<br>搜索分类，快速找到</div>
                <span class="tool-status status-beta">🔄 完善中</span>
            </a>
            <a href="https://yangru2026.github.io/training-library/" class="tool-card" target="_blank">
                <div class="tool-icon">📚</div>
                <div class="tool-name">培训资料库</div>
                <div class="tool-desc">售前培训课件资料<br>产品知识，随时学习</div>
                <span class="tool-status status-beta">🔄 完善中</span>
            </a>
        </div>
        <div class="sidebar">
            <div class="sidebar-card">
                <h3>💡 使用提示</h3>
                <p>点击卡片即可跳转<br>工具数据实时同步<br>建议收藏本页面</p>
            </div>
            <div class="sidebar-card">
                <h3>📊 数据统计</h3>
                <p>今日访问: 0<br>在线客服: 0</p>
            </div>
        </div>
    </div>
    <div class="footer">尤赫客服工作台 · 一站式工具集合</div>
</body>
</html>
