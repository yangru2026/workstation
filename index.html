<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尤赫客服工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        
        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header-subtitle {
            font-size: 15px;
            opacity: 0.9;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        
        .tool-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
        }
        
        .tool-card:nth-child(1) .tool-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .tool-card:nth-child(2) .tool-icon {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        
        .tool-card:nth-child(3) .tool-icon {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        
        .tool-name {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .tool-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        
        .tool-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 12px;
        }
        
        .status-ready {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-beta {
            background: #fff3e0;
            color: #e65100;
        }
        
        .footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
        
        @media (max-width: 640px) {
            .header-title {
                font-size: 22px;
            }
            
            .tools-grid {
                grid-template-columns: 1fr;
            }
            
            .tool-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">👁</div>
        <h1 class="header-title">尤赫客服工作台</h1>
        <p class="header-subtitle">日常工具集合</p>
    </div>
    
    <div class="tools-grid">
        <a href="https://yangru2026.github.io/degree-converter/" class="tool-card" target="_blank">
            <div class="tool-icon">🔄</div>
            <div class="tool-name">度数换算</div>
            <div class="tool-desc">快速换算不同品牌的度数对照<br>方便客服快速回复客户</div>
            <span class="tool-status status-ready">✅ 已上线</span>
        </a>
        
        <a href="https://yangru2026.github.io/stock-monitor/" class="tool-card" target="_blank">
            <div class="tool-icon">📊</div>
            <div class="tool-name">库存看板</div>
            <div class="tool-desc">实时查看库存和补货情况<br>多客服同步更新</div>
            <span class="tool-status status-beta">🔄 完善中</span>
        </a>
        
        <a href="https://yangru2026.github.io/lens-library/" class="tool-card" target="_blank">
            <div class="tool-icon">🎨</div>
            <div class="tool-name">花色素材库</div>
            <div class="tool-desc">美瞳花色上眼图素材库<br>支持搜索和分类浏览</div>
            <span class="tool-status status-beta">🔄 完善中</span>
        </a>
    </div>
    
    <div class="footer">
        尤赫客服工作台 · 一站式工具集合
    </div>
</body>
</html>
